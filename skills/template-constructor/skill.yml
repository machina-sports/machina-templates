skill:
  name: "template-constructor"
  title: "Template Constructor"
  description: "End-to-end skill for building, validating, and deploying Machina agent-templates and connectors."
  version: "1.0.0"
  category:
    - "devops"
    - "templates"
  status: "available"

  commands:
    - name: "Init Template"
      value: "init-template"
      description: "Scaffold new template project from scratch with directory structure and configuration files"

    - name: "Create Template"
      value: "create-template"
      description: "Generate individual YAML components (agent, workflow, prompt, mapping, connector)"

    - name: "Validate Template"
      value: "validate-template"
      description: "Check YAML files against correct patterns before installation"

    - name: "Install Template"
      value: "install-template"
      description: "Import templates via MCP from local filesystem or Git repositories"

    - name: "Analyze Template"
      value: "analyze-template"
      description: "Analyze template structure, dependencies, secrets, and provide component overview"

    - name: "Trace Agent"
      value: "trace-agent"
      description: "Trace agent execution chain showing workflows, tasks, variable propagation, and documents"

    - name: "Configure Secrets"
      value: "configure-secrets"
      description: "Configure vault secrets for connectors and workflows"

  workflows:
    - name: "template-constructor-init"
      description: "Initialize new template"
      agent: "template-constructor-executor"
      inputs:
        command: "init-template"
        template_name: "$.get('template_name')"
        template_type: "$.get('template_type', 'agent-templates')"
        target_repo: "$.get('target_repo')"

    - name: "template-constructor-validate"
      description: "Validate template YAML"
      agent: "template-constructor-executor"
      inputs:
        command: "validate-template"
        template_path: "$.get('template_path')"

    - name: "template-constructor-install"
      description: "Install template via MCP"
      agent: "template-constructor-executor"
      inputs:
        command: "install-template"
        template_path: "$.get('template_path')"
        environment: "$.get('environment', 'docker-localhost')"

    - name: "template-constructor-analyze"
      description: "Analyze template structure"
      agent: "template-constructor-executor"
      inputs:
        command: "analyze-template"
        template_path: "$.get('template_path')"

    - name: "template-constructor-trace"
      description: "Trace agent execution"
      agent: "template-constructor-executor"
      inputs:
        command: "trace-agent"
        agent_path: "$.get('agent_path')"
        environment: "$.get('environment', 'docker-localhost')"

    - name: "template-constructor-secrets"
      description: "Configure secrets"
      agent: "template-constructor-executor"
      inputs:
        command: "configure-secrets"
        secrets: "$.get('secrets', [])"
        environment: "$.get('environment', 'docker-localhost')"
