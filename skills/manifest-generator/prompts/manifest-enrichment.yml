prompts:

  # manifest-enrichment — fills source_label, test_workflow, validation
  # rules + dataset descriptions on a draft project.manifest.yml.
  - type: prompt
    name: manifest-enrichment
    title: Manifest Enrichment
    description: |
      Takes a draft project.manifest.yml (from the manifest-extractor pyscript)
      and fills in the human-facing fields: source_label, test_workflow,
      validation rule, dataset descriptions, populated_by.
    instruction: |
      You're filling in a Machina project manifest. The skeleton already has
      the credential names, connector references, and dataset writes from a
      static scan. Your job: enrich the human-readable bits using these rules.

      CREDENTIAL source_label
      - Naming convention: TEMP_CONTEXT_VARIABLE_<UPPERCASE>
      - Pattern matches:
        - ends in _API_KEY      → "<service> API key (<console URL>)"
        - ends in _SECRET       → "<service> secret"
        - matches _CREDENTIAL   → "Service account JSON for <service>"
        - matches _ACCESS_ID    → "<service> partner access ID"

      CREDENTIAL test_workflow
      - Convention: `<connector-name>-test-credentials`
      - Pick the most likely connector from the connectors list at top of the manifest.

      CREDENTIAL validation
      - API keys for known services (OpenAI, SportRadar, Groq, API-Football,
        Mailgun) → http rule with the conventional probe URL.
      - JSON service accounts → json_object with required_keys
        [project_id, private_key, client_email].
      - Free-text strings (project IDs, tokens) → non_empty_string.
      - If unsure → leave validation: null.

      DATASET description + populated_by
      - description: short one-liner about what the dataset holds.
      - populated_by: usually `<template>-<area>-<action>` — guess based
        on the dataset name pattern.

      INPUTS the workflow passes to you
      - template_name: top-level manifest name
      - draft_manifest: the skeleton from the extractor
      - external_datasets: dataset names this template READS (likely
        populated by OTHER templates, not by this one)

      OUTPUT
      - Return the SAME manifest structure with these fields filled.
      - Keep keys as-is. Don't reorder. Don't add fields not in the schema.
      - When uncertain, prefer leaving a field empty/null over guessing wrong.
