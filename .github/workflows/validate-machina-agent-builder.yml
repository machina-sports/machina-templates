name: Validate Machina Agent Builder

on:
  pull_request:
    paths:
      - "skills/machina-agent-builder/**"
      - "skills/mkn-constructor/**"
      - "mkn-constructor/**"
      - "scripts/validate-machina-agent-builder.py"
      - "scripts/sync-machina-agent-builder-compat.py"
      - "tests/test_machina_agent_builder_validator.py"
      - "requirements-validator.txt"
      - "CLAUDE.md"
      - "docs/skills-compatibility-spec.md"
      - ".github/workflows/validate-machina-agent-builder.yml"
  push:
    paths:
      - "skills/machina-agent-builder/**"
      - "skills/mkn-constructor/**"
      - "mkn-constructor/**"
      - "scripts/validate-machina-agent-builder.py"
      - "scripts/sync-machina-agent-builder-compat.py"
      - "tests/test_machina_agent_builder_validator.py"
      - "requirements-validator.txt"
      - "CLAUDE.md"
      - "docs/skills-compatibility-spec.md"
      - ".github/workflows/validate-machina-agent-builder.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-validator.txt
      - run: python3 scripts/sync-machina-agent-builder-compat.py --check
      - run: python3 -m unittest tests/test_machina_agent_builder_validator.py
      - run: python3 scripts/validate-machina-agent-builder.py
      # The pre-existing repository lint is disabled because it currently exits unconditionally.
