name: Build Machina Cockpit

on:
  push:
    branches: [main]
    paths:
      - "docker/machina-cockpit/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/machina-cockpit
          push: true
          tags: |
            machinasports/machina-cockpit:latest
            machinasports/machina-cockpit:${{ github.sha }}
