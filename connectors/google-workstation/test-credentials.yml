workflow:
  name: "google-workstation-test-credentials"
  title: "Google Workstation - Test Credentials"
  description: "Validate GCP service account credentials by listing workstation clusters."
  context-variables:
    debugger:
      enabled: true
    google-workstation:
      credential: $TEMP_CONTEXT_VARIABLE_GCW_CREDENTIAL
      project_id: $TEMP_CONTEXT_VARIABLE_GCW_PROJECT_ID
  inputs:
    location: "$.get('location', 'us-central1')"
  outputs:
    result: "$.get('test_result', {})"
    workflow-status: "$.get('workflow-status', 'skipped')"
  tasks:

    - type: connector
      name: google-workstation-test-credentials-task
      description: List clusters to validate credentials and permissions.
      connector:
        name: google-workstation
        command: invoke_list_clusters
      inputs:
        location: "$.get('location', 'us-central1')"
      outputs:
        test_result: "$"
        workflow-status: "'executed'"
