connector:
  name: "sociavault"
  description: "SociaVault - Social media data API for Instagram profiles, posts, reels, comments, highlights, and transcripts."
  filename: "sociavault.py"
  filetype: "pyscript"
  commands:
    - name: "Get Credits"
      value: "get_credits"
    - name: "Instagram Get Profile"
      value: "instagram_get_profile"
    - name: "Instagram Get Posts"
      value: "instagram_get_posts"
    - name: "Instagram Get Reels"
      value: "instagram_get_reels"
    - name: "Instagram Get Post Info"
      value: "instagram_get_post_info"
    - name: "Instagram Get Comments"
      value: "instagram_get_comments"
    - name: "Instagram Get Highlights"
      value: "instagram_get_highlights"
    - name: "Instagram Get Transcript"
      value: "instagram_get_transcript"
