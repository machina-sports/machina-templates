workflow:
  name: "sociavault-test-credentials"
  title: "SociaVault - Test Credentials"
  description: "Simple workflow to test SociaVault API credentials."
  context-variables:
    debugger:
      enabled: true
    sociavault:
      api_key: $TEMP_CONTEXT_VARIABLE_SOCIAVAULT_API_KEY
  outputs:
    result: "$.get('test_result', {})"
    workflow-status: "$.get('workflow-status', 'skipped')"
  tasks:

    - type: connector
      name: sociavault-test-credentials-task
      description: Test credentials by fetching credit balance.
      connector:
        name: sociavault
        command: get_credits
      inputs:
        api_key: "$.get('api_key')"
      outputs:
        test_result: |
          {
            'status': 'success' if $.get('data', {}).get('credits') is not None else 'error',
            'credits': $.get('data', {}).get('credits', 0),
            'subscription_status': $.get('data', {}).get('subscription_status', 'unknown')
          }
        workflow-status: "'executed'"
