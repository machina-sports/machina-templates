workflow:

  name: "slack-post-message"
  title: "Slack · Post Message"
  description: "Thin wrapper around the slack-webhook pyscript connector. Resolves TEMP_CONTEXT_VARIABLE_SLACK_WEBHOOK_URL from vault, forwards the message body. The pyscript handles the POST + Slack's quirky `text` vs `blocks` body shape."
  context-variables:
    debugger:
      enabled: true
    slack-webhook:
      webhook_url: "$TEMP_CONTEXT_VARIABLE_SLACK_WEBHOOK_URL"
  inputs:
    text: "$.get('text', '')"
    blocks: "$.get('blocks', [])"
    username: "$.get('username', '')"
    icon_emoji: "$.get('icon_emoji', '')"
    icon_url: "$.get('icon_url', '')"
    thread_ts: "$.get('thread_ts', '')"
  outputs:
    posted: "$.get('posted', False)"
    workflow-status: "$.get('posted') and 'executed' or 'failed'"
  tasks:

    - type: "connector"
      name: "post"
      description: "Fire the slack-webhook pyscript."
      connector:
        name: "slack-webhook"
        command: "invoke_post"
      inputs:
        webhook_url: "$.get('webhook_url')"
        text: "$.get('text')"
        blocks: "$.get('blocks')"
        username: "$.get('username')"
        icon_emoji: "$.get('icon_emoji')"
        icon_url: "$.get('icon_url')"
        thread_ts: "$.get('thread_ts')"
      outputs:
        # Connector reaching this output block means the executor saw
        # `status: True` and didn't short-circuit. Treat that alone as
        # success — Slack returns "ok" as a string in the body which
        # the workflow context can't reliably equality-compare across
        # the dict/string boundary.
        posted: "True"
