workflow:

  name: "slack-post-message"
  title: "Slack · Post Message"
  description: "Thin wrapper around Slack Incoming Webhooks. Reads TEMP_CONTEXT_VARIABLE_SLACK_WEBHOOK_URL from vault, splits the URL into the 3 path segments the connector expects inline, posts the message. Callers pass only text/blocks/username/icon_emoji."
  context-variables:
    debugger:
      enabled: true
    slack-webhook:
      webhook_url: "$TEMP_CONTEXT_VARIABLE_SLACK_WEBHOOK_URL"
  inputs:
    text: "$.get('text', '')"
    blocks: "$.get('blocks', [])"
    username: "$.get('username', '')"
    icon_emoji: "$.get('icon_emoji', '')"
    thread_ts: "$.get('thread_ts', '')"
  outputs:
    posted: "$.get('posted', False)"
    workflow-status: "$.get('posted') and 'executed' or 'failed'"
  tasks:

    - type: "connector"
      name: "post"
      description: "POST the assembled body to hooks.slack.com. URL split happens inline — context-variables resolves webhook_url, then path params are sliced out via Python list-index expressions."
      connector:
        name: "slack-webhook"
        command: "post-services-team-webhook-token"
      inputs:
        team_id: "$.get('webhook_url', '').split('/services/')[-1].split('/')[0] if '/services/' in $.get('webhook_url', '') else ''"
        webhook_id: "$.get('webhook_url', '').split('/services/')[-1].split('/')[1] if '/services/' in $.get('webhook_url', '') and len($.get('webhook_url', '').split('/services/')[-1].split('/')) > 1 else ''"
        token: "$.get('webhook_url', '').split('/services/')[-1].split('/')[2] if '/services/' in $.get('webhook_url', '') and len($.get('webhook_url', '').split('/services/')[-1].split('/')) > 2 else ''"
        text: "$.get('text')"
        blocks: "$.get('blocks')"
        username: "$.get('username')"
        icon_emoji: "$.get('icon_emoji')"
        thread_ts: "$.get('thread_ts')"
      outputs:
        posted: "$.get('status_code', 0) == 200 or $.get('data') == 'ok'"
