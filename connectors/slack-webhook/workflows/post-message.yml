workflow:

  name: "slack-post-message"
  title: "Slack · Post Message"
  description: "Thin wrapper around Slack's Incoming Webhook. Pulls the webhook URL from the vault on its own (TEMP_CONTEXT_VARIABLE_SLACK_WEBHOOK_URL), splits into the 3 path segments the connector expects, posts the message. Callers pass only `text`/`blocks`/`username`/`icon_emoji` — the URL stays vault-side."
  context-variables:
    debugger:
      enabled: true
    # Resolve the vault secret here — workflow engine substitutes
    # `$TEMP_CONTEXT_VARIABLE_*` to the actual value at task execution.
    slack:
      webhook_url: "$TEMP_CONTEXT_VARIABLE_SLACK_WEBHOOK_URL"
  inputs:
    text: "$.get('text', '')"
    blocks: "$.get('blocks', [])"
    username: "$.get('username', '')"
    icon_emoji: "$.get('icon_emoji', '')"
    thread_ts: "$.get('thread_ts', '')"
  outputs:
    posted: "$.get('posted', False)"
    workflow-status: "$.get('posted') and 'executed' or 'failed'"
  tasks:

    # Split the resolved webhook URL into team_id / webhook_id / token.
    # The context-variables block above injects `webhook_url` into the
    # task context (see machina-client-api/core/workflow/context.py
    # line ~845 — secret values get set_item'd by name).
    - type: "mapping"
      name: "split-webhook-url"
      description: "Extract team_id / webhook_id / token from the resolved Slack incoming-webhook URL."
      inputs:
        url: "$.get('webhook_url', '')"
      outputs:
        team_id: "($.get('url', '').split('/services/')[-1].split('/')[0]) if '/services/' in $.get('url', '') else ''"
        webhook_id: "($.get('url', '').split('/services/')[-1].split('/')[1]) if '/services/' in $.get('url', '') and len($.get('url', '').split('/services/')[-1].split('/')) > 1 else ''"
        token: "($.get('url', '').split('/services/')[-1].split('/')[2]) if '/services/' in $.get('url', '') and len($.get('url', '').split('/services/')[-1].split('/')) > 2 else ''"

    - type: "connector"
      name: "post"
      description: "POST the assembled body to hooks.slack.com."
      connector:
        name: "slack-webhook"
        command: "post-services-team-webhook-token"
      inputs:
        team_id: "$.get('team_id')"
        webhook_id: "$.get('webhook_id')"
        token: "$.get('token')"
        text: "$.get('text')"
        blocks: "$.get('blocks')"
        username: "$.get('username')"
        icon_emoji: "$.get('icon_emoji')"
        thread_ts: "$.get('thread_ts')"
      outputs:
        posted: "$.get('status_code', 0) == 200 or $.get('data') == 'ok'"
