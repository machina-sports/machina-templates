workflow:

  name: "slack-webhook-test-credentials"
  title: "Slack Webhook · Test Credentials"
  description: "Smoke-test the Slack incoming webhook URL by posting a one-line message. Confirms the URL is valid + the channel binding works. The slack-post-message wrapper resolves TEMP_CONTEXT_VARIABLE_SLACK_WEBHOOK_URL from the vault internally — this caller only passes the message text."
  context-variables:
    debugger:
      enabled: true
  inputs: {}
  outputs:
    ok: "$.get('ok', False)"
    workflow-status: "$.get('ok') and 'executed' or 'failed'"
  tasks:

    - type: "workflow"
      name: "post-test-message"
      description: "Fire a single test message via the post-message wrapper."
      workflow:
        name: "slack-post-message"
      inputs:
        text: "':white_check_mark: Machina slack-webhook connector credential test. Delete this message — it confirms the wiring is correct.'"
        username: "'Machina'"
        icon_emoji: "':robot_face:'"
      outputs:
        ok: "$.get('posted', False)"
