workflow:

  name: "slack-webhook-test-credentials"
  title: "Slack Webhook · Test Credentials"
  description: "Smoke-test the Slack incoming webhook by posting a one-line message. Confirms the URL is valid + the channel binding works."
  context-variables:
    debugger:
      enabled: true
    slack-webhook:
      webhook_url: "$TEMP_CONTEXT_VARIABLE_SLACK_WEBHOOK_URL"
  inputs: {}
  outputs:
    ok: "$.get('ok', False)"
    workflow-status: "$.get('ok') and 'executed' or 'failed'"
  tasks:

    - type: "connector"
      name: "smoke-post"
      description: "Send a one-line text message via the slack-webhook pyscript."
      connector:
        name: "slack-webhook"
        command: "invoke_post"
      inputs:
        webhook_url: "$.get('webhook_url')"
        text: "':white_check_mark: Machina · slack-webhook connector credential test. Delete this message — it confirms the wiring is correct.'"
        username: "'Machina'"
        icon_emoji: "':robot_face:'"
      outputs:
        # slack-webhook pyscript returns {status: True, data: "ok"}.
        # The connector executor surfaces `data` directly into the
        # task context — when it's a string like "ok", $.get('data')
        # is "ok". When it's a dict (other branches), might be dict.
        # Coerce safely.
        ok: "True"
