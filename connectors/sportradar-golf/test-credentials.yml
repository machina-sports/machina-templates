workflow:
  name: "sportradar-golf-test-credentials"
  title: "Sportradar Golf - Test Credentials"
  description: "Simple workflow to test Sportradar Golf API credentials."
  context-variables:
    debugger:
      enabled: true
    sportradar-golf:
      x-api-key: $TEMP_CONTEXT_VARIABLE_SPORTRADAR_GOLF_API_KEY
  outputs:
    result: "$.get('rankings', [])"
    workflow-status: "$.get('workflow-status', 'skipped')"
  tasks:

    - type: connector
      name: sportradar-golf-test-credentials-task
      description: Test credentials by fetching golf player rankings.
      connector:
        name: sportradar-golf
        command: get-players/rankings.json
      outputs:
        rankings: "$.get('rankings', [])"
        workflow-status: "'executed'"
