workflow:
  name: "machina-ai-test-credentials"
  title: "Machina AI Router - Test Credentials"
  description: "Tests the policy-governed router's default Google Vertex AI prompt route."
  context-variables:
    debugger:
      enabled: true
  inputs:
    prompt: "$.get('prompt', 'Say hello in one sentence.')"
  outputs:
    result: "$.get('test_result', {})"
    workflow-status: "$.get('workflow-status', 'skipped')"
  tasks:
    - type: prompt
      name: machina-ai-test-credentials-prompt
      description: Test the Vertex-backed router with a simple prompt.
      connector:
        name: machina-ai
        command: invoke_prompt
        provider: vertex_ai
        model: gemini-2.5-flash
        profile: balanced
      inputs:
        prompt: "$.get('prompt', 'Say hello in one sentence.')"
      outputs:
        test_result: "$"
        prompt-factory-status: "'executed'"

    - type: document
      name: machina-ai-test-credentials-embedding
      description: Load the Vertex embedding factory through the document runtime.
      config:
        action: search
        search-vector: true
        search-limit: 1
      connector:
        name: machina-ai
        command: invoke_embedding
        provider: vertex_ai
        model: text-embedding-004
        profile: balanced
      inputs:
        name: "'__machina_ai_router_factory_probe__'"
        search-query: "$.get('prompt', 'Say hello in one sentence.')"
      outputs:
        embedding-factory-status: "'executed'"
        workflow-status: "'executed'"
