connector:
  name: "machina-ai"
  description: "Policy-governed AI router. Repository defaults resolve to Google Vertex AI."
  filename: "machina-ai.py"
  filetype: "pyscript"
  delegates_to:
    - "google-genai"
    - "groq"
    - "nvidia-nim"
    - "stability"
    - "elevenlabs"
    - "google-speech-to-text"
    - "byteplus-modelark"
  commands:
    - name: "Prompt model"
      value: "invoke_prompt"
    - name: "Chat completion"
      value: "invoke_chat"
    - name: "Completion receipt"
      value: "completion_receipt"
    - name: "Embedding model"
      value: "invoke_embedding"
    - name: "Embed query"
      value: "embed_query"
    - name: "Embed documents"
      value: "embed_documents"
    - name: "List allowed models"
      value: "list_models"
    - name: "Health"
      value: "health"
    - name: "Search answer"
      value: "invoke_search"
    - name: "Image"
      value: "invoke_image"
    - name: "Generate image"
      value: "generate_image"
    - name: "Edit image"
      value: "edit_image"
    - name: "Video task"
      value: "invoke_video"
    - name: "Transcribe audio"
      value: "transcribe_audio_to_text"
    - name: "Transcribe audio alias"
      value: "invoke_transcribe"
    - name: "Text to speech"
      value: "invoke_tts"
    - name: "Text to speech alias"
      value: "get_text_to_speech"
    - name: "List voices"
      value: "list_voices"
    - name: "Get voices alias"
      value: "get_voices"
    - name: "Clone instant voice"
      value: "invoke_clone_instant_voice"
    - name: "Train professional voice"
      value: "invoke_train_pro_voice"
    - name: "Synthesize custom voice"
      value: "invoke_synthesize_custom_voice"
    - name: "Generate music"
      value: "invoke_music"
