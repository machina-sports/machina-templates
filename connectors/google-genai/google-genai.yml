connector:
  name: google-genai
  description: This connector is the google-genai
  filename: google-genai.py
  filetype: pyscript
  commands:
    - name: Prompt
      value: invoke_prompt

    - name: Image
      value: invoke_image

    - name: Web Search
      value: invoke_search

    - name: Video
      value: invoke_video

    - name: TTS
      value: invoke_tts

    - name: Clone Instant Voice
      value: invoke_clone_instant_voice

    - name: Train Pro Voice
      value: invoke_train_pro_voice

    - name: Synthesize Custom Voice
      value: invoke_synthesize_custom_voice

    - name: Music
      value: invoke_music