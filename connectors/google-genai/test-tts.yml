workflow:
  name: "google-genai-test-tts"
  title: "Google Gemini Test TTS"
  description: "Workflow to test Gemini Text-to-Speech. Generates audio from text using Gemini TTS models."
  context-variables:
    debugger:
      enabled: true
    google-genai:
      api_key: "$MACHINA_CONTEXT_VARIABLE_GOOGLE_GENAI_API_KEY"
    google-storage:
      api_key: "$MACHINA_CONTEXT_VARIABLE_GOOGLE_STORAGE_API_KEY"
      bucket_name: "$MACHINA_CONTEXT_VARIABLE_GOOGLE_STORAGE_BUCKET_NAME"
  inputs:
    text: "$.get('text', 'Hello! This is a test of the Gemini Text-to-Speech system. The quick brown fox jumps over the lazy dog.')"
    voice_name: "$.get('voice_name', 'Kore')"
    model_id: "$.get('model_id', 'gemini-2.5-flash-tts')"
    language_code: "$.get('language_code', 'en-us')"
    prompt: "$.get('prompt')"
  outputs:
    audio_url: "$.get('uploaded_audio_url')"
    workflow-status: "$.get('workflow-status', 'skipped')"
  tasks:

    # 1 test-tts
    - type: "connector"
      name: "test-tts"
      description: "Generate speech from text using Gemini TTS."
      connector:
        name: "google-genai"
        command: "invoke_tts"
        command_attribute:
          text: "$.get('text')"
          voice_name: "$.get('voice_name', 'Kore')"
          model_id: "$.get('model_id', 'gemini-2.5-flash-tts')"
          language_code: "$.get('language_code', 'en-us')"
          prompt: "$.get('prompt')"
      outputs:
        data: "$"
        full_filepath: "$.get('file_path')"

    # 2 save-audio
    - type: "connector"
      name: "save-audio"
      description: "Upload audio file to Google Cloud Storage."
      condition: "$.get('full_filepath') is not None"
      connector:
        name: "google-storage"
        command: "invoke_upload"
      inputs:
        image_path: "$.get('full_filepath')"
      outputs:
        uploaded_audio_url: "$.get('url')"
        workflow-status: "'executed'"
