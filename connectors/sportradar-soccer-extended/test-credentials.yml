workflow:
  name: "sportradar-soccer-extended-test-credentials"
  title: "Sportradar Soccer Extended - Test Credentials"
  description: "Simple workflow to test Sportradar Soccer Extended API credentials."
  context-variables:
    debugger:
      enabled: true
    sportradar-soccer-extended:
      api_key: $TEMP_CONTEXT_VARIABLE_SPORTRADAR_SOCCER_V4_API_KEY
  inputs:
    sport_event_id: "sr:sport_event:0"
  outputs:
    result: "$.get('test_result', {})"
    workflow-status: "$.get('workflow-status', 'skipped')"
  tasks:

    - type: connector
      name: sportradar-soccer-extended-test-credentials-task
      description: Test credentials by fetching an extended match summary. A 401/403 means the key lacks a Soccer Extended subscription; a 404 means the sport_event_id is unknown but the credentials are valid.
      connector:
        name: sportradar-soccer-extended
        command: get-sport_events/{sport_event_id}/summary.json
      inputs:
        api_key: "$.get('api_key')"
        sport_event_id: "$.get('sport_event_id')"
      outputs:
        test_result: |
          {
            'status': 'success' if $.get('generated_at') else 'error',
            'sport_event_id': $.get('sport_event', {}).get('id') if $.get('sport_event') else None
          }
        workflow-status: "'executed'"
