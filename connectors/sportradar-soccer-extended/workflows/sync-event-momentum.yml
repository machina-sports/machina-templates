workflow:

  # sportradar-soccer-extended-sync-momentum
  name: "sportradar-soccer-extended-sync-momentum"
  title: "Sportradar Soccer Extended - Sync Momentum"
  description: "Store Sportradar Soccer Extended minute-by-minute team momentum values for a match. Requires a Soccer Extended subscription and an event already synced via the base sportradar-soccer connector. Accepts a raw Sportradar id (sr:sport_event:...) or its IPTC URN."
  context-variables:
    debugger:
      enabled: false
    sportradar-soccer-extended:
      api_key: "$TEMP_CONTEXT_VARIABLE_SPORTRADAR_SOCCER_V4_API_KEY"
  inputs:
    sport_event_id: "$.get('sport_event_id')"
  outputs:
    workflow-status: "'executed'"
  tasks:

    # sportradar-soccer-extended-get-momentum
    - type: "connector"
      name: "sportradar-soccer-extended-get-momentum"
      description: "Get minute-by-minute team momentum values."
      condition: |
        (
          $.get('sport_event_id') is not None
          and $.get('sport_event_id') != ''
        )
      connector:
        name: "sportradar-soccer-extended"
        command: "get-sport_events/{sport_event_id}/momentum.json"
        command_attribute:
          sport_event_id: "$.get('sport_event_id', '').replace('urn:sportradar:sport_event:', '')"
      inputs:
        api_key: "$.get('api_key')"
      outputs:
        momentum: "$.get('momentum', {})"
        momentum-sport-event: "$.get('sport_event', {})"
        generated-at: "$.get('generated_at')"

    # task-update-event-momentum
    - type: "document"
      name: "task-update-event-momentum"
      description: "Store the momentum enrichment document."
      condition: "$.get('generated-at') is not None"
      config:
        action: "update"
        embed-vector: false
        force-update: true
      documents:
        event-momentum: |
          {
            'data': {
              'momentum': $.get('momentum', {}),
              'sport_event': $.get('momentum-sport-event', {}),
            },
            'title': f"Event {$.get('sport_event_id')} - Momentum",
            'summary': f"Sportradar Soccer Extended minute-by-minute momentum for event {$.get('sport_event_id')}."
          }
      metadata:
        document_type: "'fixture-momentum'"
        event_code: "$.get('sport_event_id') if $.get('sport_event_id', '').startswith('urn:sportradar:') else f\"urn:sportradar:sport_event:{$.get('sport_event_id')}\""
