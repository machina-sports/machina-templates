workflow:

  name: "send-email"
  title: "Resend · Send Email"
  description: "Thin wrapper around the resend pyscript connector. The connector handles Bearer-prefix + to/cc/bcc coercion + body serialization, so this workflow's job is purely: resolve the API key from vault, forward inputs."
  context-variables:
    debugger:
      enabled: true
    # Resolve the secret here — the workflow engine substitutes
    # `$TEMP_CONTEXT_VARIABLE_*` to the actual decrypted value when
    # the connector task fires (see machina-client-api/core/workflow/
    # context.py line ~845). The pyscript reads it from inputs.api_key
    # and prepends "Bearer " itself.
    resend:
      api_key: "$TEMP_CONTEXT_VARIABLE_RESEND_API_KEY"
  inputs:
    from: "$.get('from')"
    to: "$.get('to')"
    subject: "$.get('subject')"
    html: "$.get('html', '')"
    text: "$.get('text', '')"
    attachments: "$.get('attachments', [])"
    cc: "$.get('cc', [])"
    bcc: "$.get('bcc', [])"
    reply_to: "$.get('reply_to', [])"
    tags: "$.get('tags', [])"
  outputs:
    message_id: "$.get('message_id')"
    workflow-status: "$.get('message_id') is not None and 'executed' or 'failed'"
  tasks:

    - type: "connector"
      name: "send"
      description: "Fire the resend pyscript."
      connector:
        name: "resend"
        command: "invoke_send"
      inputs:
        api_key: "$.get('api_key')"
        from: "$.get('from')"
        to: "$.get('to')"
        subject: "$.get('subject')"
        html: "$.get('html')"
        text: "$.get('text')"
        cc: "$.get('cc')"
        bcc: "$.get('bcc')"
        reply_to: "$.get('reply_to')"
        attachments: "$.get('attachments')"
        tags: "$.get('tags')"
      outputs:
        message_id: "$.get('data', {}).get('id')"
