workflow:

  name: "send-email"
  title: "Resend · Send Email"
  description: "Thin wrapper around Resend's POST /emails. The Resend API key is pulled from the vault via context-variables — store it as `Bearer re_xxxxx` (full Authorization header value) since the workflow engine's $NAME substitution can't prepend a string. Coercion of `to` from str to array happens inline in the connector inputs."
  context-variables:
    debugger:
      enabled: true
    resend:
      authorization: "$TEMP_CONTEXT_VARIABLE_RESEND_API_KEY"
  inputs:
    from: "$.get('from')"
    to: "$.get('to')"
    subject: "$.get('subject')"
    html: "$.get('html', '')"
    text: "$.get('text', '')"
    attachments: "$.get('attachments', [])"
    cc: "$.get('cc', [])"
    bcc: "$.get('bcc', [])"
    tags: "$.get('tags', [])"
  outputs:
    message_id: "$.get('message_id')"
    workflow-status: "$.get('message_id') is not None and 'executed' or 'failed'"
  tasks:

    - type: "connector"
      name: "send"
      description: "POST /emails on Resend with the assembled body. Coerces `to`/`cc`/`bcc` inline — Resend rejects single-string forms with HTTP 422."
      connector:
        name: "resend"
        command: "post-emails"
      inputs:
        from: "$.get('from')"
        to: "[$.get('to')] if isinstance($.get('to'), str) else ($.get('to') or [])"
        cc: "[$.get('cc')] if isinstance($.get('cc'), str) else ($.get('cc') or [])"
        bcc: "[$.get('bcc')] if isinstance($.get('bcc'), str) else ($.get('bcc') or [])"
        subject: "$.get('subject')"
        html: "$.get('html')"
        text: "$.get('text')"
        attachments: "$.get('attachments')"
        tags: "$.get('tags')"
      outputs:
        message_id: "$.get('data', {}).get('id')"
