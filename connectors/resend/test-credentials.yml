workflow:

  name: "resend-test-credentials"
  title: "Resend · Test Credentials"
  description: "Smoke-test the Resend API key by sending one email to Resend's delivered+test address (no inbox needed). Confirms the vault entry is correct + the connector wires correctly."
  context-variables:
    debugger:
      enabled: true
    resend:
      api_key: "$TEMP_CONTEXT_VARIABLE_RESEND_API_KEY"
  inputs: {}
  outputs:
    message_id: "$.get('message_id')"
    ok: "$.get('message_id') is not None"
    workflow-status: "$.get('message_id') is not None and 'executed' or 'failed'"
  tasks:

    - type: "connector"
      name: "smoke-test"
      description: "POST to delivered@resend.dev — Resend's test inbox."
      connector:
        name: "resend"
        command: "invoke_send"
      inputs:
        api_key: "$.get('api_key')"
        from: "'onboarding@resend.dev'"
        to: "'delivered@resend.dev'"
        subject: "'Machina · Resend connector credential test'"
        text: "'If you see this, the resend connector is wired correctly.'"
      outputs:
        message_id: "$.get('id')"
