workflow:

  name: "resend-test-credentials"
  title: "Resend · Test Credentials"
  description: "Smoke-test the Resend API key by sending one email to Resend's delivered+test address (no inbox needed — Resend confirms the API key works without actually delivering). Run after installing the connector to verify the vault entry is correct."
  context-variables:
    debugger:
      enabled: true
    resend:
      authorization: "$TEMP_CONTEXT_VARIABLE_RESEND_API_KEY"
  inputs: {}
  outputs:
    message_id: "$.get('message_id')"
    ok: "$.get('message_id') is not None"
    workflow-status: "$.get('message_id') is not None and 'executed' or 'failed'"
  tasks:

    - type: "connector"
      name: "smoke-test"
      description: "Send a no-op email to the Resend test address. Confirms the API key + the connector wiring."
      connector:
        name: "resend"
        command: "post-emails"
      inputs:
        from: "'onboarding@resend.dev'"
        to: "['delivered@resend.dev']"
        subject: "'Machina · Resend connector credential test'"
        text: "'If you see this, the resend connector is wired correctly.'"
      outputs:
        message_id: "$.get('data', {}).get('id')"
