setup:
  title: Google Storage
  description: Upload files to Google Cloud Storage from local paths, URLs, authenticated gs:// sources, raw bytes, or Base64.
  category:
    - special-templates
  estimatedTime: 1 minute
  features:
    - Upload local files, HTTP/HTTPS URLs, raw bytes, and Base64 (Data URI or raw)
    - Authenticated gs:// and storage.googleapis.com downloads
    - Custom remote_path and cache_control overrides
    - GCS V4 compatibility
  integrations:
    - google
  status: available
  value: connectors/google-storage
  version: 2.0.0

datasets:

  - type: "connector"
    path: "google-storage.yml"

  - type: "workflow"
    path: "test-upload.yml"
