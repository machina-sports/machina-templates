workflow:
  name: "sports-skills-test-credentials"
  title: "Sports Skills — Smoke Test"
  description: "Validates that the sports-skills Python package is reachable from the pod runtime. Calls football.get_competitions (no API key required) and expects a non-empty list of leagues back."
  context-variables:
    debugger:
      enabled: false
  inputs: {}
  outputs:
    competitions: "$.get('competitions', [])"
    workflow-status: "len($.get('competitions', [])) > 0 and 'executed' or 'failed'"
  tasks:
    - type: "connector"
      name: "smoke-football-get-competitions"
      description: "Call sports_skills.football.get_competitions() — zero-config call, should return ~13 leagues."
      connector:
        name: "sports-skills"
        command: "invoke_football"
      inputs:
        command: "'get_competitions'"
      outputs:
        competitions: "$.get('data', {}).get('items', $.get('data', []))"
