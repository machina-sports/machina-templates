connector:
  name: "sports-skills"
  description: "Aggregator over 21 sports-data domains via the machina-sports/sports-skills Python package. Each command dispatches to one module; pass `command=<function_name>` in workflow inputs plus the function's kwargs. Most public-data modules (football, NBA, NFL, NHL, MLB, tennis, golf, F1, cricket, esports) need no API keys; betting markets (kalshi, polymarket) need their own."
  filename: "sports-skills.py"
  filetype: "pyscript"
  commands:
    - name: "Football (soccer)"
      value: "invoke_football"
    - name: "NBA"
      value: "invoke_nba"
    - name: "WNBA"
      value: "invoke_wnba"
    - name: "NFL"
      value: "invoke_nfl"
    - name: "NHL"
      value: "invoke_nhl"
    - name: "MLB"
      value: "invoke_mlb"
    - name: "College Football (CFB)"
      value: "invoke_cfb"
    - name: "College Basketball (CBB)"
      value: "invoke_cbb"
    - name: "Tennis"
      value: "invoke_tennis"
    - name: "Golf"
      value: "invoke_golf"
    - name: "Formula 1"
      value: "invoke_f1"
    - name: "Volleyball"
      value: "invoke_volleyball"
    - name: "Cross-country / Track & Field"
      value: "invoke_xctf"
    - name: "Cricket"
      value: "invoke_cricket"
    - name: "Esports"
      value: "invoke_esports"
    - name: "Polymarket"
      value: "invoke_polymarket"
    - name: "Kalshi"
      value: "invoke_kalshi"
    - name: "Betting utilities"
      value: "invoke_betting"
    - name: "Markets (cross-sportsbook)"
      value: "invoke_markets"
    - name: "Metadata (logos, etc.)"
      value: "invoke_metadata"
    - name: "Sports news"
      value: "invoke_news"
    - name: "Sports skills (dynamic dispatcher)"
      value: "invoke_sports_skills"
