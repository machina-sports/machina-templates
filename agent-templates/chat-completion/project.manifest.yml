# Chat Completion — Project Manifest
#
# Minimal chat-only project: one connector, one credential pair, a single
# chat loop. Useful as the "hello world" baseline for Project Health adoption.
#
# Smallest possible manifest — bigger projects can copy this as the starting
# point and add their own credentials + datasets.

name: chat-completion
version: 1
description: "Minimal chat completion project — Vertex AI-backed conversational loop"

required_credentials:
  - name: TEMP_CONTEXT_VARIABLE_VERTEX_AI_CREDENTIAL
    source_label: "GCP service-account JSON for Vertex AI"
    test_workflow: google-genai-test-credentials
    validation:
      type: json_schema
  - name: TEMP_CONTEXT_VARIABLE_VERTEX_AI_PROJECT_ID
    source_label: "GCP project ID hosting Vertex AI"
    test_workflow: google-genai-test-credentials

required_config_documents: []

required_templates:
  - repo: https://github.com/machina-sports/machina-templates
    path: agent-templates/chat-completion
    reason: "This template — chat-executor agent + reasoning/response prompts"
  - repo: https://github.com/machina-sports/machina-templates
    path: connectors/google-genai
    reason: "Vertex AI connector — prompts and embeddings"

depends_on_datasets: []
