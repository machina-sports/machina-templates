  category:
    - content-creation
  estimatedTime: 15 minutes
  features:
    - Quizzes
  integrations:
    - google-genai
    - vertex-embedding
  status: available
  value: agent-templates/template-quizzes
  version: 1.1.0

datasets:

  # connectors
  - type: "connector"
    path: "../../connectors/google-genai/google-genai.yml"
  - type: "connector"
    path: "../../connectors/vertex-embedding/vertex-embedding.yml"
  - type: "connector"
    path: "../../connectors/machina-ai-fast/machina-ai-fast.yml"

  - type: "workflow"
    path: "chat-completions.yml"

  # quizzes-by-topic
  - type: "workflow"
    path: "quizzes-by-topic.yml"

  # folders setup
  - type: "workflow"
    path: "_folders.yml"

  # documents setup
  - type: "prompts"
    path: "_prompts.yml"