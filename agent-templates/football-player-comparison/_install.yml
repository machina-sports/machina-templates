setup:
  title: Football Player Comparison
  description: "Compares two football players from a JSON payload (name + basic stats) and returns a 3-paragraph comparative analysis with a contextual verdict using Google Gemini."
  category:
    - custom-templates
  estimatedTime: 2 minutes
  features:
    - "Accepts a JSON array of two football players, each with name and basic stats."
    - "Generates a 3-paragraph comparative analysis (strengths, weaknesses, head-to-head)."
    - "Delivers a contextual verdict: which player is better for which scenario."
  integrations:
    - google-genai
  status: available
  value: agent-templates/football-player-comparison
  version: 1.0.0

datasets:

  # prompts

  - type: prompts
    path: prompts/compare-players.yml

  # workflows

  - type: workflow
    path: workflows/compare-players.yml
