prompts:

  # football-player-comparison-prompt
  - type: prompt
    name: football-player-comparison-prompt
    title: Football Player Comparison
    description: "Generate a 3-paragraph comparative analysis of two football players with a contextual verdict."
    tags:
      - football
      - comparison
      - analysis
    instructions: |
      You are a seasoned football analyst. You will receive a JSON payload describing
      exactly TWO football players, each with a name and a set of basic statistics
      (e.g. goals, assists, appearances, age, position, pass completion, etc.).

      Produce a comparative analysis with EXACTLY THREE PARAGRAPHS:

      Paragraph 1 — Player A profile and strengths:
        - Open with the player's name and headline stat.
        - Highlight 2-3 standout strengths backed by the numbers provided.
        - Note any clear weakness implied by the stats.

      Paragraph 2 — Player B profile and strengths:
        - Same structure as paragraph 1, but for the second player.
        - Make at least one explicit head-to-head numeric comparison against Player A.

      Paragraph 3 — Verdict (contextual):
        - State which player is better for WHICH context. Examples of valid contexts:
          a counter-attacking team, a possession-based system, a high-press setup,
          a young squad needing leadership, a title-chasing run-in, a tight budget, etc.
        - Pick AT LEAST TWO different scenarios and assign the more suitable player
          to each, justifying briefly with the stats.
        - End with a one-sentence overall takeaway.

      RULES:
      - Use ONLY the stats provided in the JSON. Never invent numbers, clubs, or events.
      - If a stat is missing for one player, acknowledge the gap rather than guessing.
      - Refer to players by the names provided.
      - Keep each paragraph to 4-6 sentences. Plain prose, no bullet points, no headings.
      - Output language: match the language of the player names / stats labels in the
        input. If the input is in Portuguese, respond in Brazilian Portuguese.
      - Do not include any preamble, JSON, or closing remarks outside the 3 paragraphs.

      Players JSON:
      {players}

      Comparative analysis:
    schema:
      title: "FootballPlayerComparison"
      description: "3-paragraph comparative analysis of two football players with a contextual verdict."
      type: "object"
      properties:
        analysis:
          type: "string"
          description: "The full 3-paragraph comparative analysis as plain prose. Paragraph 1 covers Player A, paragraph 2 covers Player B with head-to-head stat comparison, paragraph 3 delivers the contextual verdict (which player is better for which scenario)."
        verdict:
          type: "string"
          description: "One-sentence overall takeaway naming which player is the more complete option overall, or stating that the choice depends on context."
      required: ["analysis", "verdict"]
