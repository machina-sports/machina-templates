prompts:

  # event-podcast-script-prompt
  - type: "prompt"
    title: "Event Podcast Script Prompt"
    name: "event-podcast-script-prompt"
    description: "Generates a ~5-minute (~750 words) podcast script for a sports event, given the event ID and any retrieved event details."
    schema:
      title: "EventPodcastScript"
      description: "Structured podcast episode for a sports event, designed to run roughly 5 minutes when read aloud."
      type: "object"
      properties:
        title:
          type: "string"
          description: "Catchy episode title referencing the event."
        summary:
          type: "string"
          description: "One-paragraph summary of the episode (2-4 sentences)."
        script:
          type: "string"
          description: "Full narration-ready podcast script. Target ~750 words (about 5 minutes spoken). Single host, conversational tone, with a hook, key moments, analysis, and an outro. No stage directions, no markdown — only spoken words."
        file_name:
          type: "string"
          description: "Suggested file name (without extension) for the audio asset, kebab-case, e.g. 'event-12345-recap'."
      required: ["title", "summary", "script", "file_name"]
