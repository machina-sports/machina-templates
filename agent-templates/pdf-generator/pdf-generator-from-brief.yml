workflow:
  name: "pdf-generator-from-brief"
  title: "PDF Generator — from Brief"
  description: "Take a freeform brand brief, draft a structured brand-assets payload via Gemini, render the PDF, and upload it to Google Cloud Storage."
  context-variables:
    debugger:
      enabled: true
    google-genai:
      credential: "$TEMP_CONTEXT_VARIABLE_VERTEX_AI_CREDENTIAL"
      project_id: "$TEMP_CONTEXT_VARIABLE_VERTEX_AI_PROJECT_ID"
    google-storage:
      api_key: "$TEMP_CONTEXT_VARIABLE_GOOGLE_STORAGE_API_KEY"
      bucket_name: "$TEMP_CONTEXT_VARIABLE_GOOGLE_STORAGE_BUCKET_NAME"
  inputs:
    brief: "$.get('brief', '')"
    brand_name: "$.get('brand_name', '')"
    brand_color: "$.get('brand_color', '#111111')"
    page_size: "$.get('page_size', 'Letter')"
    remote_path: "$.get('remote_path', 'pdfs/')"
  outputs:
    pdf_url: "$.get('pdf_url')"
    pdf_path: "$.get('pdf_path')"
    pdf_filename: "$.get('pdf_filename')"
    workflow-status: "$.get('pdf_url') is not None and 'executed' or 'skipped'"
  tasks:

    # 1. Draft a structured brand-assets payload from the brief.
    - type: "prompt"
      name: "brand-assets-from-brief-prompt"
      description: "Turn a freeform brief into a structured brand-assets payload."
      connector:
        name: "google-genai"
        command: "invoke_prompt"
        model: "gemini-2.5-flash"
        location: "global"
        provider: "vertex_ai"
      inputs:
        brief: "$.get('brief')"
        brand_name: "$.get('brand_name')"
      outputs:
        brand_name: "$.get('brand_name')"
        tagline: "$.get('tagline')"
        about: "$.get('about')"
        mission: "$.get('mission')"
        values: "$.get('values', [])"
        palette: "$.get('palette', [])"
        typography: "$.get('typography', [])"
        voice: "$.get('voice', {})"
        contact: "$.get('contact', {})"

    # 2. Render the PDF.
    - type: "connector"
      name: "render-pdf"
      description: "Render the brand-assets PDF from the drafted payload."
      connector:
        name: "pdf-generator"
        command: "invoke_generate"
      inputs:
        template: "'brand-assets'"
        page_size: "$.get('page_size')"
        brand_color: "$.get('brand_color')"
        content:
          brand_name: "$.get('brand_name')"
          tagline: "$.get('tagline')"
          about: "$.get('about')"
          mission: "$.get('mission')"
          values: "$.get('values', [])"
          palette: "$.get('palette', [])"
          typography: "$.get('typography', [])"
          voice: "$.get('voice', {})"
          contact: "$.get('contact', {})"
      outputs:
        pdf_data_uri: "$.get('data', {}).get('data_uri')"
        pdf_filename: "$.get('data', {}).get('filename')"

    # 3. Upload to GCS.
    - type: "connector"
      name: "upload-pdf"
      description: "Upload the rendered PDF to Google Cloud Storage."
      condition: "$.get('pdf_data_uri') is not None and len($.get('pdf_data_uri', '')) > 0"
      connector:
        name: "google-storage"
        command: "invoke_upload"
      inputs:
        api_key: "$.get('api_key')"
        bucket_name: "$.get('bucket_name')"
        file_path: "$.get('pdf_data_uri')"
        filename: "$.get('pdf_filename')"
        remote_path: "$.get('remote_path')"
        cache_control: "'public, max-age=300'"
      outputs:
        pdf_url: "$.get('data', {}).get('url')"
        pdf_path: "$.get('data', {}).get('path')"
