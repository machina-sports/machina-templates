workflow:

  name: player-scoring-odds
  title: Player Scoring Odds
  description: |
    Receives a player stats object (name, team, goals_scored, appearances,
    minutes_played, competition, recent_form) and uses Gemini to calculate
    the probability of the player scoring one or more goals in the next
    match. Returns structured odds with confidence and reasoning.

  context-variables:
    debugger:
      enabled: false
    google-genai:
      credential: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_CREDENTIAL
      project_id: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_PROJECT_ID

  inputs:
    player_stats: "$.get('player_stats', {})"

  outputs:
    scoring_odds: "$.get('scoring_odds', {})"
    workflow-status: "$.get('scoring_odds') and 'executed' or 'skipped'"

  tasks:

    - type: prompt
      name: player-scoring-odds-prompt
      description: Analyze player stats and calculate goal-scoring probability
      condition: "$.get('player_stats') is not None and $.get('player_stats') != {}"
      connector:
        name: google-genai
        command: invoke_prompt
        model: gemini-2.5-flash
        location: global
        provider: vertex_ai
      inputs:
        player_stats: "$.get('player_stats', {})"
      outputs:
        scoring_odds: "$.get('scoring_odds', {})"
