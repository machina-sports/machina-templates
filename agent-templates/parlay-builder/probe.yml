workflow:
  name: "parlay-probe"
  title: "Parlay Probe"
  description: "Temp probe to inspect sports-skills get_daily_schedule shape."
  inputs:
    target_date: "$.get('target_date')"
  outputs:
    raw: "$.get('raw')"
    workflow-status: "'executed'"
  tasks:
    - type: "connector"
      name: "fetch"
      connector:
        name: "sports-skills"
        command: "invoke_football"
      inputs:
        command: "'get_daily_schedule'"
        date: "$.get('target_date')"
      outputs:
        raw: "$"
