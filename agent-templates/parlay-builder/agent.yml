agent:
  name: "parlay-builder"
  title: "Parlay Builder"
  description: >
    Chat-driven parlay builder for a white-label sportsbook. Bettors send a
    free-text angle and get back 3 ranked tickets with combined odds,
    per-leg justifications, and a JSON payload the operator's frontend
    renders. The agent NEVER places bets — it only proposes.
  type: "interaction"
  entry-point: "parlay-builder"
  context-variables:
    google-genai:
      credential: "$TEMP_CONTEXT_VARIABLE_VERTEX_AI_CREDENTIAL"
      project_id: "$TEMP_CONTEXT_VARIABLE_VERTEX_AI_PROJECT_ID"
