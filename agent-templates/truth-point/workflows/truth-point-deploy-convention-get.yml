workflow:

  # truth-point-deploy-convention-get
  name: truth-point-deploy-convention-get
  title: Truth Point — Get Deploy Convention
  description: |
    Lookup the deploy convention for a given repo
    (e.g. "machina-sports/machina-studio"). Returns the matching entry
    from the singleton `deploy-conventions` doc, or an empty result when
    no convention has been seeded yet — Factory falls back to "blind
    merge" in that case.

    Consumed by Factory's deploy mode immediately before merging a PR so
    it can identify the right post-merge GitHub Actions workflow to watch
    (vs. picking the first run on the merge SHA, which can be a PR-checks
    run).

  context-variables:
    debugger:
      enabled: false

  inputs:
    repo: $.get('repo', '')

  outputs:
    repo: $.get('repo', '')
    conventions: $.get('conventions', [])
    workflow-status: "'executed'"

  tasks:

    # Returns the full list of conventions. The caller (Factory) filters
    # by `repo` client-side. We tried filtering by repo here but
    # `$.get('repo')` in an output expression resolves against the
    # search response, not the workflow inputs — so the filter never
    # matched. Returning all conventions sidesteps that.
    - type: document
      name: lookup-conventions
      description: Pull the deploy-conventions doc and surface the full list
      config:
        action: search
        search-limit: 1
        search-vector: false
      filters:
        name: "'deploy-conventions'"
      outputs:
        conventions: |
          $.get('documents', [])[0].get('value', {}).get('conventions', []) if len($.get('documents', [])) > 0 else []
