workflow:
  name: futebol-brasil-load-fixtures
  title: "Futebol Brasil | Load Fixtures"
  description: "Fetch fixtures from api-football for one competition/season window. Incremental: skip if synced recently."
  context-variables:
    debugger:
      enabled: false
    api-football:
      x-apisports-key: "$TEMP_CONTEXT_VARIABLE_API_FOOTBALL_API_KEY"
  inputs:
    competition: "$.get('competition')"
    league_id: "$.get('league_id')"
    season: "$.get('season')"
    team: "$.get('team')"
    from: "$.get('from')"
    to: "$.get('to')"
    next: "$.get('next', 50)"
    last: "$.get('last')"
    force: "$.get('force', False)"
    ttl_minutes: "$.get('ttl_minutes', 15)"
  outputs:
    fixtures: "$.get('fixtures', [])"
    skipped: "$.get('skipped', False)"
    workflow-status: "len($.get('fixtures', [])) > 0 and 'executed' or ($.get('skipped') and 'skipped' or 'empty')"
  tasks:

    - type: document
      name: read-sync-marker
      config:
        action: search
        search-limit: 1
        search-vector: false
      inputs:
        title: "f\"Futebol Brasil | Fixtures load · {$.get('competition', 'unknown')}\""
        metadata.document_type: "'futebol-brasil-sync-marker'"
      outputs:
        last_synced_at: "$.get('documents')[0].get('value', {}).get('synced_at') if len($.get('documents', [])) > 0 else None"

    - type: document
      name: gate-skip
      condition: "not $.get('force', False) and $.get('last_synced_at') is not None"
      config:
        action: search
        search-limit: 0
        search-vector: false
      inputs:
        name: "'__noop__'"
      outputs:
        skipped: "True"

    - type: connector
      name: task-get-fixtures
      condition: "not $.get('skipped', False)"
      connector:
        name: api-football
        command: get-fixtures
      inputs:
        league: "$.get('league_id')"
        season: "$.get('season')"
        team: "$.get('team')"
        from: "$.get('from')"
        to: "$.get('to')"
        next: "$.get('next') if $.get('from') is None and $.get('to') is None and $.get('last') is None else None"
        last: "$.get('last')"
      outputs:
        fixtures: "$.get('response', [])"
        fixtures_count: "len($.get('response', []))"

    - type: document
      name: write-sync-marker
      condition: "not $.get('skipped', False)"
      config:
        action: bulk-update
        embed-selector: "$.get('title')"
        embed-vector: false
        force-update: true
      document_name: "'futebol-brasil-sync-marker'"
      documents:
        items: |
          [
            {
              'title': f"Futebol Brasil | Fixtures load · {$.get('competition', 'unknown')}",
              'competition': $.get('competition'),
              'league_id': $.get('league_id'),
              'season': $.get('season'),
              'count': $.get('fixtures_count', 0),
              'synced_at': datetime.utcnow(),
              'status': 'active',
              'metadata': {
                'competition': $.get('competition'),
                'document_type': 'futebol-brasil-sync-marker'
              }
            }
          ]
      metadata:
        competition: "$.get('competition')"
        document_type: "'futebol-brasil-sync-marker'"
