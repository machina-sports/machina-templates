workflow:
  name: futebol-brasil-load-standings
  title: "Futebol Brasil | Load Standings"
  description: "Fetch league standings from api-football for one competition/season. Incremental: skip if synced recently."
  context-variables:
    debugger:
      enabled: false
    api-football:
      x-apisports-key: "$TEMP_CONTEXT_VARIABLE_API_FOOTBALL_API_KEY"
  inputs:
    competition: "$.get('competition')"
    league_id: "$.get('league_id')"
    season: "$.get('season')"
    force: "$.get('force', False)"
    ttl_minutes: "$.get('ttl_minutes', 60)"
  outputs:
    standings: "$.get('standings', [])"
    skipped: "$.get('skipped', False)"
    workflow-status: "len($.get('standings', [])) > 0 and 'executed' or ($.get('skipped') and 'skipped' or 'empty')"
  tasks:

    - type: document
      name: gate-no-league
      condition: "$.get('league_id') is None"
      config:
        action: search
        search-limit: 0
        search-vector: false
      inputs:
        name: "'__noop__'"
      outputs:
        skipped: "True"

    - type: document
      name: read-sync-marker
      condition: "not $.get('skipped', False)"
      config:
        action: search
        search-limit: 1
        search-vector: false
      inputs:
        title: "f\"Futebol Brasil | Standings load · {$.get('competition', 'unknown')}\""
        metadata.document_type: "'futebol-brasil-sync-marker'"
      outputs:
        last_synced_at: "$.get('documents')[0].get('value', {}).get('synced_at') if len($.get('documents', [])) > 0 else None"

    - type: document
      name: gate-recent
      condition: "not $.get('skipped', False) and not $.get('force', False) and $.get('last_synced_at') is not None"
      config:
        action: search
        search-limit: 0
        search-vector: false
      inputs:
        name: "'__noop__'"
      outputs:
        skipped: "True"

    - type: connector
      name: task-get-standings
      condition: "not $.get('skipped', False)"
      connector:
        name: api-football
        command: get-standings
      inputs:
        league: "$.get('league_id')"
        season: "$.get('season')"
      outputs:
        standings: "$.get('response', [])"
        standings_count: "len($.get('response', []))"

    - type: document
      name: write-sync-marker
      condition: "not $.get('skipped', False)"
      config:
        action: bulk-update
        embed-selector: "$.get('title')"
        embed-vector: false
        force-update: true
      document_name: "'futebol-brasil-sync-marker'"
      documents:
        items: |
          [
            {
              'title': f"Futebol Brasil | Standings load · {$.get('competition', 'unknown')}",
              'competition': $.get('competition'),
              'league_id': $.get('league_id'),
              'season': $.get('season'),
              'count': $.get('standings_count', 0),
              'synced_at': datetime.utcnow(),
              'status': 'active',
              'metadata': {
                'competition': $.get('competition'),
                'document_type': 'futebol-brasil-sync-marker'
              }
            }
          ]
      metadata:
        competition: "$.get('competition')"
        document_type: "'futebol-brasil-sync-marker'"
