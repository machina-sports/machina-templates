workflow:
  name: analyze-sentiment
  title: "Analyze Sentiment"
  description: "Analyzes the sentiment of a given text using xAI Grok."
  inputs:
    text_to_analyze: $.get('text_to_analyze', '')
  tasks:
    - name: analyze
      type: prompt
      connector:
        name: "xAI Grok"
        command: "invoke_prompt"
        model: "grok-1.5-flash"
      prompt:
        name: "sentiment-analysis-prompt"
      inputs:
        text_input: "$.get('text_to_analyze')"
      outputs:
        sentiment_result: "$.get('result')"
  outputs:
    result: "$.get('sentiment_result')"
    workflow-status: "$.get('sentiment_result') and 'executed' or 'skipped'"
