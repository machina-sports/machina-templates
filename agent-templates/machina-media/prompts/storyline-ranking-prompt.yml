prompt:
  name: storyline-ranking-prompt
  title: Storyline Ranking
  description: "Ranks candidate storylines based on editorial rules and assigns them to content slots."

  # The schema for the AI's response, which should be a JSON object containing a ranked queue of storylines.
  schema:
    type: "object"
    properties:
      ranked_queue:
        type: "array"
        description: "A ranked list of storylines with routing decisions."
        items:
          type: "object"
          properties:
            id:
              type: "string"
              description: "The unique identifier of the storyline."
            headline:
              type: "string"
              description: "The headline of the storyline."
            urgency:
              type: "string"
              description: "The original urgency of the storyline."
            routing:
              type: "string"
              description: "The assigned content destination (live_desk, briefing, postgame, breaking_alert, social_only, ignored)."
          required: ["id", "headline", "urgency", "routing"]

  # The text of the prompt sent to the language model.
  text: |
    You are an automated executive producer for Machina Media. Your job is to rank a list of candidate storylines and decide how they should be routed for content creation.

    The current content slot we are programming for is: {current_slot}

    Here are the candidate storylines to evaluate:
    {candidate_storylines}

    You must rank and route these storylines based on the following editorial rules:
    {editorial_rules}

    Your task is to return a JSON object containing a `ranked_queue` array. Each item in the array should be a storyline object from the input, but with an added `routing` key.

    The possible values for `routing` are:
    - `live_desk`: For immediate, in-game updates. Prioritize high-leverage moments, scoring swings, and key player injuries.
    - `briefing`: For pre-game or daily summary shows. Good for setting up narratives, discussing trades, or statistical anomalies.
    - `postgame`: For post-game recap shows. Focus on final results, record-breaking performances, and upset outcomes.
    - `breaking_alert`: Reserved for truly exceptional, high-impact news like major trades or season-ending injuries to star players.
    - `social_only`: For smaller, interesting facts or milestones that are engaging but don't require a full segment.
    - `ignored`: For low-signal recaps, dead games, filler content, or anything that violates our editorial rules (e.g., rights-dependent video).

    Evaluate each storyline against the editorial rules and the current programming slot. The final output should be a clean JSON array of objects, ordered from most to least important.
