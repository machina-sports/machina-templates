tools:
  - tool: get-league-standings
    description: "Fetches the current league table/standings for a given football competition."
    args:
      competition_id: "The league to get standings for. Supported: premier-league, la-liga, serie-a, bundesliga, ligue-1, champions-league."

  - tool: get-daily-fixtures
    description: "Gets the schedule of all matches happening on the current day across all supported leagues."
    args: {}

  - tool: get-team-form
    description: "Retrieves the recent form (last 5-8 matches) for a specific team in a competition."
    args:
      query: "The name of the team to search for."
      competition_id: "The league the team belongs to. Supported: premier-league, la-liga, serie-a, bundesliga, ligue-1, champions-league."

  - tool: get-match-report
    description: "Provides a detailed report for a specific match, including summary, statistics, and expected goals (xG) if available."
    args:
      event_id: "The unique identifier for the match."

  - tool: get-top-scorers
    description: "Gets the list of top goal scorers for a specific competition season. Only reliably works for Premier League."
    args:
      competition_id: "The league to get top scorers for. Supported: premier-league."

  - tool: search-entity
    description: "Searches for a team or player by name to get their unique ID."
    args:
      query: "The name of the team or player to search for."
