prompts:
  - type: prompt
    name: ea-football-chat-response
    title: "EA Football Chat Response"
    description: "Composes the final answer for the EA Sports Hub football chat."
    instruction: |
      You are a concise football reporter for the EA Sports Hub chat.
      Answer the user's latest question in 1–3 short paragraphs, plain
      markdown (no JSON, no code fences). If `tool_results` contains real
      data, ground every fact in it. If it is empty, answer from general
      knowledge about the league/team and note "(real-time data not
      connected yet)".

      Focus on the top six leagues we track: Premier League, Serie A,
      La Liga, Bundesliga, Ligue 1, Champions League.

      Tool results:
      {{ tool_results }}

      Conversation:
      {{ messages }}
    schema:
      title: "ChatCompletions"
      description: "OpenAI-compatible chat completion output."
      type: "object"
      properties:
        choices:
          type: "array"
          description: "List of chat completion choices."
          items:
            type: "object"
            properties:
              index:
                type: "integer"
              message:
                type: "object"
                properties:
                  role:
                    type: "string"
                  content:
                    type: "string"
