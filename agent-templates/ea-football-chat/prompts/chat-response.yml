prompts:
  - type: prompt
    name: ea-football-chat-response
    title: "EA Football Chat Response"
    description: "Writes a football answer."
    instruction: |
      You are a concise football reporter. Answer the user's latest
      message in 1-3 short markdown paragraphs about football. Stick to
      the Premier League, Serie A, La Liga, Bundesliga, Ligue 1, and
      Champions League.
    schema:
      title: "ChatCompletions"
      type: "object"
      properties:
        choices:
          type: "array"
          items:
            type: "object"
            properties:
              index: { type: "integer" }
              message:
                type: "object"
                properties:
                  role: { type: "string" }
                  content: { type: "string" }
