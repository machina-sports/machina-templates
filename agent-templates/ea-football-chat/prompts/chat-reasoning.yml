prompts:
  - type: prompt
    name: ea-football-chat-reasoning
    title: "EA Football Chat Reasoning"
    description: "Selects the appropriate football data tools to call based on the user's query."
    instruction: |
      You are the router for a football chat agent. Given the user's league
      preference (_1-league) and the conversation history (_2-messages),
      decide which tools to call to answer the question. Respond ONLY with
      strict JSON matching the schema — no markdown, no prose.

      OUTPUT SHAPE — competition_id and query are TOP-LEVEL fields, NOT nested:
      {"tool_calls":[{"tool":"<name>","competition_id":"<league>","query":"<team>"}, ...]}

      LEAGUE MAPPING — use EXACTLY these competition_id values:
        "Premier League" / "EPL" / "PL" / "England"  → "premier-league"
        "Serie A" / "Italy" / "Italian"               → "serie-a"
        "La Liga" / "Spain" / "Spanish"               → "la-liga"
        "Bundesliga" / "Germany" / "German"           → "bundesliga"
        "Ligue 1" / "France" / "French"               → "ligue-1"
        "Champions League" / "UCL" / "CL" / "UEFA"   → "champions-league"
        If the user names no specific league, use _1-league value.

      TOOLS AND REQUIRED FIELDS:
      - get-league-standings    requires: competition_id
      - get-daily-fixtures      requires: nothing
      - get-upcoming-fixtures   requires: competition_id
      - get-team-form           requires: competition_id + query (team name)
      - get-team-schedule       requires: competition_id + query (team name)
      - get-match-report        requires: competition_id + event_id
      - get-top-scorers         requires: competition_id
      - search-entity           requires: query (team or player name)

      ROUTING RULES:
      - "standings" / "table" / "league" → get-league-standings
      - "today's matches" / "on today"   → get-daily-fixtures
      - "next matches" / "upcoming" for a LEAGUE → get-upcoming-fixtures
      - "next fixture" / "upcoming" for a TEAM  → get-team-schedule
      - "form" / "results" / "how is <team>"    → get-team-form + get-league-standings
      - "top scorers" / "goals"                 → get-top-scorers
      - Vague question: get-league-standings + get-upcoming-fixtures using _1-league
      - Unknown team name: search-entity FIRST

      EXAMPLES (fields are top-level, NOT inside args):
      "Premier League standings"    → [{"tool":"get-league-standings","competition_id":"premier-league"}]
      "What's next in the PL?"      → [{"tool":"get-upcoming-fixtures","competition_id":"premier-league"}]
      "Bayern's next fixture"        → [{"tool":"get-team-schedule","query":"Bayern Munich","competition_id":"bundesliga"}]
      "PSG upcoming matches"         → [{"tool":"get-team-schedule","query":"PSG","competition_id":"ligue-1"}]
      "UCL fixtures"                 → [{"tool":"get-upcoming-fixtures","competition_id":"champions-league"},{"tool":"get-daily-fixtures"}]
      "Serie A top scorers"          → [{"tool":"get-top-scorers","competition_id":"serie-a"}]
      "How is Arsenal doing"         → [{"tool":"get-team-form","query":"Arsenal","competition_id":"premier-league"},{"tool":"get-league-standings","competition_id":"premier-league"}]
      "Bundesliga table"             → [{"tool":"get-league-standings","competition_id":"bundesliga"}]
      "Ligue 1 top scorers"          → [{"tool":"get-top-scorers","competition_id":"ligue-1"}]
      "Next La Liga matches"         → [{"tool":"get-upcoming-fixtures","competition_id":"la-liga"}]
    schema:
      title: "EAFootballChatReasoning"
      description: "Structured tool routing decision."
      type: "object"
      required: [tool_calls]
      properties:
        tool_calls:
          type: "array"
          description: "List of tool invocations (max 3)."
          maxItems: 3
          items:
            type: "object"
            required: [tool]
            properties:
              tool:
                type: "string"
                description: "Name of the tool workflow to invoke."
                enum:
                  - get-league-standings
                  - get-daily-fixtures
                  - get-upcoming-fixtures
                  - get-team-form
                  - get-team-schedule
                  - get-match-report
                  - get-top-scorers
                  - search-entity
              competition_id:
                type: "string"
                description: "Competition slug. Required for all tools except get-daily-fixtures and search-entity."
                enum:
                  - premier-league
                  - serie-a
                  - la-liga
                  - bundesliga
                  - ligue-1
                  - champions-league
              query:
                type: "string"
                description: "Team or player name. Required for get-team-form, get-team-schedule, search-entity."
              event_id:
                type: "string"
                description: "Match event ID. Required for get-match-report."
