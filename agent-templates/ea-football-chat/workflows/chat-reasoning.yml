workflow:
  name: chat-reasoning
  title: "EA Football Chat Reasoning"
  description: "Routes user message to sports-skills tool calls via the ea-football-chat-reasoning prompt."
  inputs:
    messages: "$.get('messages', [])"
    league: "$.get('league', 'premier-league')"
  outputs:
    tool_calls: "$.get('tool_calls', [])"
    workflow-status: "'executed'"
  tasks:
    - type: prompt
      name: ea-football-chat-reasoning
      description: "Select sports-skills tool calls from the user's message."
      connector:
        command: invoke_prompt
        name: google-genai
        model: gemini-2.5-flash
        location: global
        provider: vertex_ai
      inputs:
        _1-league: "$.get('league')"
        _2-messages: "$.get('messages', [])"
      outputs:
        tool_calls: "$.get('tool_calls', [])"
