workflow:
  name: chat-reasoning
  title: "Chat Reasoning"
  description: "Routes user message to tool selection."
  inputs:
    - { name: messages, type: list }
    - { name: league, type: string, required: false }
  outputs:
    tool_calls: "$.get('result').get('tool_calls', [])"
    workflow-status: "$.get('result') is not None"
  tasks:
    - type: "prompt"
      name: "reasoning_prompt"
      description: "Invoke the main reasoning prompt."
      prompt:
        name: "ea-football-chat-reasoning"
      connector:
        name: "machina-ai"
        command: "invoke_prompt"
        model: "gemini-2.5-flash"
      inputs:
        messages: "$.get('messages')"
        league: "$.get('league')"
      outputs:
        result: "$.get('result')"
