workflow:
  name: chat-reasoning
  title: "EA Football Chat Reasoning"
  description: "Classifies user intent and extracts football query parameters."
  inputs:
    messages: "$.get('messages', [])"
    league: "$.get('league', 'premier-league')"
  outputs:
    reasoning: "$.get('reasoning', {})"
    workflow-status: "'executed'"
  tasks:
    - type: prompt
      name: ea-football-chat-reasoning
      description: "Classify intent and extract football query parameters."
      connector:
        command: invoke_prompt
        name: google-genai
        model: gemini-2.5-flash
        location: global
        provider: vertex_ai
      inputs:
        _1-league: "$.get('league')"
        _2-messages: "$.get('messages', [])"
      outputs:
        reasoning: $
