workflow:
  name: chat-response
  title: "Chat Response"
  description: "Formats the final assistant turn (text + suggestions)."
  inputs:
    - { name: messages, type: list }
    - { name: tool_results, type: list }
  outputs:
    message: "$.get('result').get('message', 'I was unable to retrieve the information.')"
    suggestions: "$.get('result').get('suggestions', [])"
    workflow-status: "$.get('result') is not None"
  tasks:
    - type: "prompt"
      name: "response_prompt"
      description: "Invoke the main response prompt."
      prompt:
        name: "ea-football-chat-response"
      connector:
        name: "machina-ai"
        command: "invoke_prompt"
        model: "gemini-2.5-pro"
      inputs:
        messages: "$.get('messages')"
        tool_results: "$.get('tool_results')"
      outputs:
        result: "$.get('result')"
