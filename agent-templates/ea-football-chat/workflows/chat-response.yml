workflow:
  name: chat-response
  title: "EA Football Chat Response"
  description: "Calls google-genai directly with messages."
  inputs:
    messages: "$.get('messages', [])"
    tool_results: "$.get('tool_results', [])"
  outputs:
    message: "$.get('content', 'No response.')"
    suggestions: "[]"
    workflow-status: "'executed'"
  tasks:
    - type: "connector"
      name: "llm_call"
      description: "Direct google-genai call."
      connector:
        name: "google-genai"
        command: "invoke_chat"
        model: "gemini-2.5-flash"
      inputs:
        messages: "$.get('messages', [])"
      outputs:
        content: "$.get('content', $.get('text', ''))"
