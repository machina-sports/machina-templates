workflow:
  name: chat-response
  title: "EA Football Chat Response"
  description: "Composes the final markdown answer from tool results."
  context-variables:
    google-genai:
      api_key: "$TEMP_CONTEXT_VARIABLE_GOOGLE_GENERATIVE_AI_API_KEY"
  inputs:
    messages: "$.get('messages', [])"
    tool_results: "$.get('tool_results', [])"
  outputs:
    message: "$.get('message', '')"
    suggestions: "$.get('suggestions', [])"
    workflow-status: "'executed'"
  tasks:
    - type: "prompt"
      name: "ea-football-chat-response"
      description: "Invoke the response prompt."
      connector:
        name: "google-genai"
        command: "invoke_prompt"
        model: "gemini-2.5-pro"
      inputs:
        messages: "$.get('messages')"
        tool_results: "$.get('tool_results')"
      outputs:
        message: "$.get('message', '')"
        suggestions: "$.get('suggestions', [])"
