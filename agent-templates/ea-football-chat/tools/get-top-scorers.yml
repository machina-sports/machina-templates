workflow:
  name: get-top-scorers
  title: "Get Top Scorers"
  description: "Gets the list of top goal scorers for a specific competition season."
  inputs:
    competition_id: "$.get('competition_id')"
  outputs:
    result: "$.get('leaders', {'unsupported': True})"
    workflow-status: "$.get('result') is not None"
  tasks:
    - type: "connector"
      name: "get_current_season"
      description: "Get the current season ID for the competition."
      condition: "$.get('competition_id') == 'premier-league'"
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_current_season'"
        competition_id: "$.get('competition_id')"
      outputs:
        season_id: "$.get('result').get('season_id')"

    - type: "connector"
      name: "get_season_leaders"
      description: "Get the top scorers for the season."
      condition: "$.get('season_id') is not None"
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_season_leaders'"
        season_id: "$.get('season_id')"
      outputs:
        leaders: "$.get('result')"
