workflow:
  name: get-top-scorers
  title: "Get Top Scorers"
  description: "Gets the list of top goal scorers for a specific competition season."
  inputs:
    - { name: competition_id, type: string }
  outputs:
    result: "$.get('leaders', $.get('stats'))"
    workflow-status: "$.get('result') is not None"
  tasks:
    - type: "connector"
      name: "get_current_season"
      description: "Get the current season ID for the competition."
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_current_season'"
        competition_id: "$.get('competition_id')"
      outputs:
        season_id: "$.get('result').get('season_id')"

    - type: "connector"
      name: "get_season_leaders"
      description: "Get the top scorers for the season (PL only)."
      condition: "$.get('season_id') is not None and $.get('competition_id') == 'premier-league'"
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_season_leaders'"
        season_id: "$.get('season_id')"
      outputs:
        leaders: "$.get('result')"

    # This is a fallback. The prompt is a bit ambiguous on how to get player stats
    # without an event. I will assume there's a get_season_players_statistics.
    # If not, this task will fail gracefully and the output will be based on the first task.
    - type: "connector"
      name: "get_player_stats_fallback"
      description: "Fallback to get player statistics for other leagues."
      condition: "$.get('season_id') is not None and $.get('competition_id') != 'premier-league'"
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_season_players_statistics'" # This is a guessed command name
        season_id: "$.get('season_id')"
      outputs:
        stats: "$.get('result')"
