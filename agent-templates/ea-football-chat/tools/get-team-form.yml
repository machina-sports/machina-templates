workflow:
  name: get-team-form
  title: "Get Team Form"
  description: "Retrieves the recent form (last 5 matches) for a specific team."
  inputs:
    query: "$.get('query')"
    competition_id: "$.get('competition_id')"
  outputs:
    result: "$.get('summaries')"
    workflow-status: "$.get('summaries') is not None"
  tasks:
    - type: "connector"
      name: "search_for_team"
      description: "Search for the team by name."
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'search_team'"
        query: "$.get('query')"
      outputs:
        search_result: "$"

    - type: "connector"
      name: "get_team_schedule"
      description: "Get the team's recent schedule."
      condition: "$.get('search_result', {}).get('results', [])"
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_team_schedule'"
        team_id: "$.get('search_result', {}).get('results', [{}])[0].get('team', {}).get('id')"
        limit: 5
      outputs:
        schedule: "$.get('events')"

    - type: "map"
      name: "get_match_summaries"
      description: "Get summaries for the last 5 matches."
      condition: "$.get('schedule') is not None"
      map:
        variable: "schedule"
        iterator: "match"
        tasks:
          - type: "connector"
            connector:
              name: "sports-skills"
              command: "football"
            inputs:
              command: "'get_event_summary'"
              event_id: "$.get('match').get('id')"
            outputs:
              summary: "$"
      outputs:
        summaries: "[task.get('summary') for task in $.get('results')]"
