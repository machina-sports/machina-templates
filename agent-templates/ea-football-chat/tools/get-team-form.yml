workflow:
  name: get-team-form
  title: "Get Team Form"
  description: "Retrieves the recent form (last 5 matches) for a specific team."
  inputs:
    query: "$.get('query')"
    competition_id: "$.get('competition_id')"
  outputs:
    result: "{'team': $.get('team'), 'events': $.get('events', [])}"
    workflow-status: "$.get('events') is not None and 'executed' or 'skipped'"
  tasks:
    - type: "connector"
      name: "search_for_team"
      description: "Search for the team by name."
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'search_team'"
        query: "$.get('query')"
        competition_id: "$.get('competition_id')"
      outputs:
        team_id: "($.get('results') or [{}])[0].get('id') if $.get('results') else None"

    - type: "connector"
      name: "get_team_schedule"
      description: "Get the team's schedule."
      condition: "$.get('team_id') is not None"
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_team_schedule'"
        team_id: "$.get('team_id')"
      outputs:
        team: "$.get('team')"
        events: "$.get('events', [])"
