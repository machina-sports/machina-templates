workflow:
  name: get-match-report
  title: "Get Match Report"
  description: "Provides a detailed report for a specific match, including summary, statistics, and expected goals (xG)."
  inputs:
    - { name: event_id, type: string }
  outputs:
    result: "{'summary': $.get('summary'), 'statistics': $.get('statistics'), 'xg': $.get('xg', 'N/A')}"
    workflow-status: "$.get('summary') is not None"
  tasks:
    - type: "connector"
      name: "get_summary"
      description: "Get the match summary."
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_event_summary'"
        event_id: "$.get('event_id')"
      outputs:
        summary: "$.get('result')"

    - type: "connector"
      name: "get_statistics"
      description: "Get the match statistics."
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_event_statistics'"
        event_id: "$.get('event_id')"
      outputs:
        statistics: "$.get('result')"

    - type: "connector"
      name: "get_xg"
      description: "Get the expected goals for the match."
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_event_xg'"
        event_id: "$.get('event_id')"
      outputs:
        xg: "$.get('result')"
