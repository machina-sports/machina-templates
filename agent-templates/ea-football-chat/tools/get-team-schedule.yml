workflow:
  name: get-team-schedule
  title: "Get Team Schedule"
  description: "Fetches the upcoming and recent fixtures for a specific team."
  inputs:
    query: "$.get('query')"
    competition_id: "$.get('competition_id')"
  outputs:
    result: "$.get('schedule')"
    workflow-status: "$.get('schedule') is not None"
  tasks:
    - type: "connector"
      name: "search_for_team"
      description: "Search for the team by name."
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'search_team'"
        query: "$.get('query')"
      outputs:
        search_result: "$"

    - type: "connector"
      name: "get_team_schedule"
      description: "Get the team's upcoming and recent schedule."
      condition: "$.get('search_result', {}).get('results', [])"
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'get_team_schedule'"
        team_id: "$.get('search_result', {}).get('results', [{}])[0].get('team', {}).get('id')"
        limit: 10
      outputs:
        schedule: "$.get('events')"
