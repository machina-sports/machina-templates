workflow:
  name: diag-ping
  title: "Diagnostic Ping"
  description: "Calls sports-skills connector with command=ping to confirm dispatcher is alive."
  inputs: {}
  outputs:
    ping: "$.get('ping')"
    received_params: "$.get('received_params')"
    lib_check: "$.get('lib_check')"
    workflow-status: "$.get('ping') == 'pong' and 'executed' or 'skipped'"
  tasks:
    - type: "connector"
      name: "ping"
      description: "Ping the dispatcher."
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'ping'"
      outputs:
        ping: "$.get('ping')"
        received_params: "$.get('received_params')"
        lib_check: "$.get('lib_check')"
