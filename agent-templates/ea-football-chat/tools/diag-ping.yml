workflow:
  name: diag-ping
  title: "Diagnostic Ping"
  description: "Calls sports-skills connector with command=ping to isolate the bool error."
  inputs: {}
  outputs:
    sk_output: "$.get('sk_output')"
    whole_dollar: "$.get('whole_dollar')"
    status_seen: "$.get('status_seen')"
    literal: "$.get('literal')"
    workflow-status: "'executed'"
  tasks:
    - type: "connector"
      name: "ping"
      description: "Ping the dispatcher."
      connector:
        name: "sports-skills"
        command: "football"
      inputs:
        command: "'ping'"
        sample: "'hello'"
      outputs:
        sk_output: "$.get('sk_output')"
        whole_dollar: "$"
        status_seen: "$.get('status')"
        literal: "'alive'"
