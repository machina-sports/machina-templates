agent:
  name: ea-football-chat
  title: "EA Sports Hub Football Chat"
  description: "Chat agent that answers football questions using live ESPN/Understat data."

  context:
    status: "inactive"

  context-agent:
    messages: $.get('messages', [])
    league: "$.get('inputs', {}).get('league') or $.get('league', 'premier-league')"
    thread_id: $.get('thread_id', None)

  workflows:

    # 1. Reasoning — pick the tool (or none) and prep args.
    - name: chat-reasoning
      description: "Decide which tool to call."
      condition: $.get('messages') is not None and len($.get('messages')) > 0
      inputs:
        messages: $.get('messages')
        league: $.get('league')
      outputs:
        tool_calls: $.get('tool_calls', [])
        reasoning_status: $.get('workflow-status') == 'executed'

    # 2a. League standings
    - name: get-league-standings
      description: "League table"
      condition: "any(c.get('tool') == 'get-league-standings' for c in $.get('tool_calls', []))"
      inputs:
        competition_id: "next((c.get('args', {}).get('competition_id') for c in $.get('tool_calls', []) if c.get('tool') == 'get-league-standings'), 'premier-league')"
      outputs:
        standings_result: $.get('result')

    # 2b. Daily fixtures
    - name: get-daily-fixtures
      description: "Today's matches"
      condition: "any(c.get('tool') == 'get-daily-fixtures' for c in $.get('tool_calls', []))"
      outputs:
        fixtures_result: $.get('result')

    # 2c. Top scorers
    - name: get-top-scorers
      description: "Season leaders"
      condition: "any(c.get('tool') == 'get-top-scorers' for c in $.get('tool_calls', []))"
      inputs:
        competition_id: "next((c.get('args', {}).get('competition_id') for c in $.get('tool_calls', []) if c.get('tool') == 'get-top-scorers'), 'premier-league')"
      outputs:
        scorers_result: $.get('result')

    # 3. Response — format reply
    - name: chat-response
      description: "Format the final reply."
      condition: $.get('messages') is not None and len($.get('messages')) > 0
      inputs:
        messages: $.get('messages')
        tool_results: |
          {
            'standings': $.get('standings_result'),
            'fixtures': $.get('fixtures_result'),
            'scorers': $.get('scorers_result')
          }
      outputs:
        message: $.get('message', '')
        content: $.get('message', '')
        response_text: $.get('message', '')
        tool_calls: $.get('tool_calls', [])

  outputs:
    result: $.get('message', '')
    content: $.get('message', '')
    workflow-status: "'executed'"
