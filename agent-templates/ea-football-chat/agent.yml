agent:
  name: ea-football-chat
  title: "EA Sports Hub Football Chat"
  description: "Chat agent that answers football questions using live ESPN/Understat data."

  context:
    status: "inactive"

  context-agent:
    messages: $.get('messages', [])
    league: "$.get('inputs', {}).get('league') or $.get('league', 'premier-league')"
    thread_id: $.get('thread_id', None)

  workflows:

    # 1. Reasoning — pick tool + args
    - name: chat-reasoning
      description: "Pick the tool and args."
      condition: $.get('messages') is not None and len($.get('messages')) > 0
      inputs:
        messages: $.get('messages')
        league: $.get('league')
      outputs:
        tool_calls: $.get('tool_calls', [])
        picked_tool: "$.get('tool_calls', [{}])[0].get('tool') if len($.get('tool_calls', [])) > 0 else None"
        picked_args: "$.get('tool_calls', [{}])[0].get('args', {}) if len($.get('tool_calls', [])) > 0 else {}"

    # 2a. League standings
    - name: get-league-standings
      description: "League table"
      condition: "$.get('picked_tool') == 'get-league-standings'"
      inputs:
        competition_id: "$.get('picked_args', {}).get('competition_id') or $.get('league', 'premier-league')"
      outputs:
        standings_result: $.get('result')

    # 2b. Daily fixtures
    - name: get-daily-fixtures
      description: "Today's matches"
      condition: "$.get('picked_tool') == 'get-daily-fixtures'"
      outputs:
        fixtures_result: $.get('result')

    # 2c. Team form
    - name: get-team-form
      description: "Team's recent form"
      condition: "$.get('picked_tool') == 'get-team-form'"
      inputs:
        query: "$.get('picked_args', {}).get('query')"
        competition_id: "$.get('picked_args', {}).get('competition_id') or $.get('league', 'premier-league')"
      outputs:
        team_form_result: $.get('result')

    # 2d. Match report
    - name: get-match-report
      description: "Match summary + stats + xG"
      condition: "$.get('picked_tool') == 'get-match-report'"
      inputs:
        event_id: "$.get('picked_args', {}).get('event_id')"
        competition_id: "$.get('picked_args', {}).get('competition_id') or $.get('league', 'premier-league')"
      outputs:
        match_report_result: $.get('result')

    # 2e. Top scorers
    - name: get-top-scorers
      description: "Season leaders"
      condition: "$.get('picked_tool') == 'get-top-scorers'"
      inputs:
        competition_id: "$.get('picked_args', {}).get('competition_id') or $.get('league', 'premier-league')"
      outputs:
        scorers_result: $.get('result')

    # 2f. Search entity
    - name: search-entity
      description: "Search team or player"
      condition: "$.get('picked_tool') == 'search-entity'"
      inputs:
        query: "$.get('picked_args', {}).get('query')"
      outputs:
        search_result: $.get('result')

    # 3. Response — format reply
    - name: chat-response
      description: "Format the final reply."
      condition: $.get('messages') is not None and len($.get('messages')) > 0
      inputs:
        messages: $.get('messages')
        tool_results: |
          {
            'picked_tool': $.get('picked_tool'),
            'picked_args': $.get('picked_args'),
            'standings': $.get('standings_result'),
            'fixtures': $.get('fixtures_result'),
            'team_form': $.get('team_form_result'),
            'match_report': $.get('match_report_result'),
            'scorers': $.get('scorers_result'),
            'search': $.get('search_result')
          }
      outputs:
        message: $.get('message', '')
        content: $.get('message', '')
        response_text: $.get('message', '')

  outputs:
    result: $.get('message', '')
    content: $.get('message', '')
    message: $.get('message', '')
    workflow-status: "'executed'"
