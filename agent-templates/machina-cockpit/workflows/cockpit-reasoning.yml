workflow:

  # machina-cockpit-reasoning
  name: machina-cockpit-reasoning
  title: Machina Cockpit - Reasoning
  description: Analyze user message and prepare prompt for Claude Code execution

  context-variables:
    debugger:
      enabled: false
    google-genai:
      credential: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_CREDENTIAL
      project_id: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_PROJECT_ID

  inputs:
    thread_id: $.get('thread_id')
    input_message: $.get('input_message')

  outputs:
    reasoning: $.get('reasoning', {})
    document_id: $.get('document_id', None)
    session_id: $.get('session_id')
    workflow-status: $.get('document_id') is not None and 'executed' or 'skipped'

  tasks:

    # Load existing thread
    - type: document
      name: load-thread-document
      description: Load conversation thread
      condition: $.get('thread_id') is not None and $.get('thread_id') != ''
      config:
        action: search
        search-limit: 1
        search-vector: false
      filters:
        name: "'thread'"
        document_id: $.get('thread_id')
      outputs:
        document_id: $.get('documents')[0].get('_id') if len($.get('documents', [])) > 0 else None
        document_value: $.get('documents')[0].get('value', {}) if len($.get('documents', [])) > 0 else {}
        messages_loaded: $.get('documents')[0].get('value', {}).get('messages', []) if len($.get('documents', [])) > 0 else []
        session_id: $.get('documents')[0].get('value', {}).get('session_id') if len($.get('documents', [])) > 0 else None

    # Create thread if it doesn't exist
    - type: document
      name: create-thread-document
      description: Create new conversation thread
      condition: $.get('document_id') is None
      config:
        action: save
        embed-vector: false
        force-update: true
      documents:
        thread: |
          {
            'messages': [],
            'session_id': None,
            'status': 'created',
            'context': 'machina-cockpit'
          }
      metadata:
        agent_id: "'machina-cockpit'"
        created_at: datetime.now().isoformat()
      outputs:
        document_id: $.get('documents')[0].get('_id') if len($.get('documents', [])) > 0 else None
        document_value: $.get('documents')[0].get('value', {}) if len($.get('documents', [])) > 0 else {}
        messages_loaded: []

    # Reasoning prompt — analyze user message
    - type: prompt
      name: machina-cockpit-reasoning-prompt
      condition: $.get('document_id') is not None
      connector:
        command: invoke_prompt
        name: google-genai
        model: gemini-2.5-flash
        location: global
        provider: vertex_ai
      inputs:
        _1-conversation-history: $.get('messages_loaded', [])[-5:]
        _2-user-message: $.get('input_message')
      outputs:
        reasoning: $

    # Update thread with user message + reasoning status
    - type: document
      name: update-thread-reasoning
      condition: $.get('document_id') is not None
      config:
        action: update
        embed-vector: false
        force-update: true
      documents:
        thread: |
          {
            **$.get('document_value'),
            'messages': [
              *$.get('document_value').get('messages', []),
              {
                'role': 'user',
                'content': $.get('input_message'),
                'timestamp': datetime.now().isoformat()
              }
            ],
            'status': 'reasoning',
            'status_message': $.get('reasoning', {}).get('short_message', 'Processing...')
          }
      filters:
        document_id: $.get('document_id')
