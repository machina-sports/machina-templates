workflow:

  # machina-cockpit-start-workstation
  name: machina-cockpit-start-workstation
  title: Machina Cockpit - Start Workstation
  description: Start the GCW workstation so it is ready for Claude Code execution

  context-variables:
    debugger:
      enabled: false
    google-workstation:
      credential: $TEMP_CONTEXT_VARIABLE_GCW_CREDENTIAL
      project_id: $TEMP_CONTEXT_VARIABLE_GCW_PROJECT_ID

  inputs: {}

  outputs:
    workstation_state: $.get('workstation_state', 'unknown')
    workflow-status: $.get('start_success') is True and 'executed' or 'skipped'

  tasks:

    # Start workstation
    - type: connector
      name: start-workstation-task
      description: Start GCW workstation
      connector:
        name: google-workstation
        command: invoke_start_workstation
      inputs:
        credential: "$.get('credential')"
        project_id: "$.get('project_id')"
        location: "'us-central1'"
        cluster: "'machina-cluster'"
        config: "'machina-config'"
        workstation: "'machina-ws-01'"
      outputs:
        workstation_state: "$.get('state', 'unknown')"
        start_success: "$.get('state') is not None"
