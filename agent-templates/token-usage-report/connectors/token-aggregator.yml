connector:
  name: "token-aggregator"
  description: "Query pod /execution/workflow-search + /execution/agent-search, aggregate token consumption over a configurable window. Two modes: single-pod (`invoke_aggregate`) and multi-pod with org-level rollup (`invoke_aggregate_multi`)."
  filename: "token-aggregator.py"
  filetype: "pyscript"
  commands:
    - name: "Aggregate Tokens (single pod)"
      value: "invoke_aggregate"
    - name: "Aggregate Tokens (multi-pod, per-org)"
      value: "invoke_aggregate_multi"
