workflow:

  name: "token-usage-report"
  title: "Token Usage Report"
  description: "End-to-end token-consumption report — works for weekly (last Mon-Sun) AND monthly (last calendar month) cadences via the same workflow, cadence selected by `period_mode` input. Aggregates the pod's own /execution/* endpoints, renders a PDF via pdf-generator's metrics-report layout, uploads to GCS, then notifies via email (Resend) and Slack (incoming webhook). Schedule it twice for weekly + monthly coverage, each with a different `period_mode`."
  context-variables:
    debugger:
      enabled: true
    resend:
      authorization: "$TEMP_CONTEXT_VARIABLE_RESEND_API_KEY"
    google-storage:
      api_key: "$TEMP_CONTEXT_VARIABLE_GOOGLE_STORAGE_API_KEY"
      bucket_name: "$TEMP_CONTEXT_VARIABLE_GOOGLE_STORAGE_BUCKET_NAME"
  inputs:
    # Cadence selector. One of: previous_week (default — last Mon-Sun),
    # previous_month (last calendar month), rolling_days (last N days).
    period_mode: "$.get('period_mode', 'previous_week')"

    # Window size when period_mode == "rolling_days". Ignored for
    # previous_week / previous_month.
    period_days: "$.get('period_days', 7)"

    # All config passed explicitly by the caller (cron / ad-hoc). The
    # workflow engine's $NAME substitution only fires inside
    # `context-variables` blocks scoped by connector name — it can't
    # resolve vault entries into arbitrary input defaults. So the
    # scheduler passes everything in the cron's --inputs block:
    #   {
    #     "period_mode": "previous_week",
    #     "api_base_url": "http://localhost:5003",
    #     "api_key": "<pod api key>",
    #     "project_label": "Machina Reports",
    #     "brand_color": "#FE4000",
    #     "email_from": "...",
    #     "email_to": "..."
    #   }
    api_base_url: "$.get('api_base_url', '')"
    api_key: "$.get('api_key', '')"
    project_label: "$.get('project_label', 'Project')"
    brand_color: "$.get('brand_color', '#0A2540')"
    email_from: "$.get('email_from', '')"
    email_to: "$.get('email_to', '')"

    # Channel toggles — let the operator opt-out of one channel
    # without uninstalling.
    notify_email: "$.get('notify_email', True)"
    notify_slack: "$.get('notify_slack', True)"

  outputs:
    pdf_url: "$.get('pdf_url')"
    total_tokens: "$.get('total_tokens', 0)"
    total_runs: "$.get('total_runs', 0)"
    email_message_id: "$.get('email_message_id')"
    slack_posted: "$.get('slack_posted', False)"
    workflow-status: "$.get('pdf_url') is not None and 'executed' or 'failed'"

  tasks:

    # ---------------------------------------------------------------
    # 1. Aggregate token usage from the pod's own /execution/* endpoints
    # ---------------------------------------------------------------
    - type: "connector"
      name: "aggregate-tokens"
      description: "Query workflow + agent executions over the window, group by name, build a metrics-report payload."
      connector:
        name: "token-aggregator"
        command: "invoke_aggregate"
      inputs:
        api_base_url: "$.get('api_base_url')"
        api_key: "$.get('api_key')"
        period_mode: "$.get('period_mode')"
        period_days: "$.get('period_days')"
        project_label: "$.get('project_label')"
        brand_color: "$.get('brand_color')"
      outputs:
        # Workflow engine spreads the connector's `data` dict keys
        # into the task context at the root level — so
        # $.get('total_tokens') resolves but $.get('data',{}).get('total_tokens')
        # returns None. Same pattern as resend wrapper (message_id is
        # read as $.get('id'), not nested).
        report_payload: "$.get('payload')"
        total_tokens: "$.get('total_tokens', 0)"
        total_runs: "$.get('total_runs', 0)"
        period_from: "$.get('period_from')"
        period_to: "$.get('period_to')"
        period_mode_used: "$.get('period_mode')"
        mode_label: "$.get('mode_label', 'Report')"
        brand_color: "$.get('brand_color', '#0A2540')"

    # ---------------------------------------------------------------
    # 2. Render the PDF via the existing pdf-generator template's
    #    metrics-report layout, upload to GCS, capture public URL
    # ---------------------------------------------------------------
    - type: "workflow"
      name: "render-pdf"
      description: "Hand the aggregated payload to pdf-generator. Returns a public GCS URL."
      workflow:
        name: "pdf-generator"
      inputs:
        # Workflow yml inputs are evaluated as Python expressions —
        # bare strings like "metrics-report" get treated as
        # `metrics - report`. Wrap every string literal in single
        # quotes inside the outer yml quotes (same pattern pdf-generator
        # uses for `cache_control: "'public, max-age=300'"`).
        template: "'metrics-report'"
        content: "$.get('report_payload', {})"
        filename: "''"
        page_size: "'Letter'"
        brand_color: "$.get('brand_color')"
        remote_path: "'token-usage-reports/'"
      outputs:
        pdf_url: "$.get('pdf_url')"
        pdf_filename: "$.get('pdf_filename')"
        size_bytes: "$.get('size_bytes')"
        page_count: "$.get('page_count')"

    # ---------------------------------------------------------------
    # 3. Email via Resend (subject/body composed inline via f-strings;
    #    recipient list parsed inline from comma-separated vault value;
    #    no mapping task — that's reserved for registered mappings)
    # ---------------------------------------------------------------
    - type: "workflow"
      name: "send-email"
      description: "Fire the email via the Resend wrapper workflow. Wrapper coerces single-string `to` to array and adds the Bearer-prefixed auth header from vault."
      condition: "$.get('notify_email', True) and $.get('pdf_url') is not None and len($.get('email_to', '')) > 0"
      workflow:
        name: "send-email"
      inputs:
        from: "$.get('email_from')"
        to: "[a.strip() for a in $.get('email_to', '').split(',') if a.strip()]"
        subject: "f\"{$.get('project_label', 'Project')} · {$.get('mode_label', 'Report')} Token Report · {$.get('period_to', '')[:10]}\""
        text: "f\"{$.get('mode_label', 'Report')} token report for {$.get('project_label', 'Project')}.\\n\\nTotal tokens: {$.get('total_tokens', 0):,}\\nTotal runs: {$.get('total_runs', 0):,}\\n\\nPDF: {$.get('pdf_url', '')}\""
      outputs:
        email_message_id: "$.get('message_id')"

    # ---------------------------------------------------------------
    # 4. Slack via incoming webhook — wrapper resolves SLACK_WEBHOOK_URL
    #    from vault, no need to pass it from the caller
    # ---------------------------------------------------------------
    - type: "workflow"
      name: "post-slack"
      description: "Fire the Slack message via the slack-post-message wrapper. The webhook URL stays inside that wrapper's context-variables."
      condition: "$.get('notify_slack', True) and $.get('pdf_url') is not None"
      workflow:
        name: "slack-post-message"
      inputs:
        text: "f\":bar_chart: *{$.get('project_label', 'Project')}* — {$.get('mode_label', 'report')} token report\\n• *{$.get('total_tokens', 0):,}* tokens · *{$.get('total_runs', 0):,}* runs\\n• <{$.get('pdf_url', '')}|Open PDF>\""
        username: "'Machina · Reports'"
        icon_emoji: "':bar_chart:'"
      outputs:
        slack_posted: "$.get('posted')"
