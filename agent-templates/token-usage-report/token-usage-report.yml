workflow:

  name: "token-usage-report"
  title: "Token Usage Report"
  description: "End-to-end token-consumption report. Aggregates one customer pod's /execution/* endpoints, renders a PDF via pdf-generator → uploads to GCS → emails (Resend) + posts to Slack (incoming webhook). Bills-quality output — used to produce customer invoices."
  context-variables:
    debugger:
      enabled: true
    # Vault secrets resolved when each connector task fires. The engine
    # only substitutes `$TEMP_CONTEXT_VARIABLE_*` here (scoped by
    # connector name), not in arbitrary input expressions. After
    # substitution the values land both in task headers AND the
    # workflow context, accessible via $.get('<field>').
    resend:
      api_key: "$TEMP_CONTEXT_VARIABLE_RESEND_API_KEY"
    slack-webhook:
      webhook_url: "$TEMP_CONTEXT_VARIABLE_SLACK_WEBHOOK_URL"
    google-storage:
      api_key: "$TEMP_CONTEXT_VARIABLE_GOOGLE_STORAGE_API_KEY"
      bucket_name: "$TEMP_CONTEXT_VARIABLE_GOOGLE_STORAGE_BUCKET_NAME"
  inputs:
    # Cadence. One of: previous_week (last Mon-Sun), previous_month
    # (last calendar month), rolling_days (last N days).
    period_mode: "$.get('period_mode', 'previous_week')"
    period_days: "$.get('period_days', 7)"

    # Customer pod to query (passed by the cron schedule).
    # NB: the customer pod's api_key sits in workflow context as
    # `api_key` until the resend task's context-variables overwrites
    # it with the Resend key. Order matters: aggregate-tokens MUST
    # run before send-email-task.
    api_base_url: "$.get('api_base_url', '')"
    api_key: "$.get('api_key', '')"

    # Display + delivery. `org_label` is the umbrella org name (Entain,
    # DAZN, Machina); `project_label` is the specific pod (SBOT
    # Production, Sports Interaction v2). Combined in subject/body
    # as "<Org> · <Project>" so notifications are unambiguous when
    # multiple pods report into the same Slack channel + email inbox.
    org_label: "$.get('org_label', '')"
    project_label: "$.get('project_label', 'Project')"
    brand_color: "$.get('brand_color', '#FE4000')"
    email_from: "$.get('email_from', 'Machina Reports <onboarding@resend.dev>')"
    email_to: "$.get('email_to', '')"
    notify_email: "$.get('notify_email', True)"
    notify_slack: "$.get('notify_slack', True)"

  outputs:
    pdf_url: "$.get('pdf_url')"
    total_tokens: "$.get('total_tokens', 0)"
    total_runs: "$.get('total_runs', 0)"
    email_message_id: "$.get('email_message_id')"
    slack_posted: "$.get('slack_posted', False)"
    workflow-status: "($.get('email_message_id') is not None or $.get('slack_posted')) and 'executed' or 'failed'"

  tasks:

    # ---------------------------------------------------------------
    # 1. Aggregate token usage from the customer pod
    # ---------------------------------------------------------------
    - type: "connector"
      name: "aggregate-tokens"
      description: "Query customer pod's workflow + agent executions over the window, group by name, build a metrics-report payload."
      connector:
        name: "token-aggregator"
        command: "invoke_aggregate"
      inputs:
        api_base_url: "$.get('api_base_url')"
        api_key: "$.get('api_key')"
        period_mode: "$.get('period_mode')"
        period_days: "$.get('period_days')"
        # Project label that lands in the PDF title — combine org +
        # project when both present so the PDF heading reads
        # "Entain · SBOT Production · Weekly Token Report".
        project_label: "f\"{($.get('org_label') + ' · ') if $.get('org_label') else ''}{$.get('project_label')}\""
        brand_color: "$.get('brand_color')"
      outputs:
        report_payload: "$.get('payload')"
        total_tokens: "$.get('total_tokens', 0)"
        total_runs: "$.get('total_runs', 0)"
        period_from: "$.get('period_from')"
        period_to: "$.get('period_to')"
        mode_label: "$.get('mode_label', 'Report')"

    # ---------------------------------------------------------------
    # 2. Render the PDF via the existing pdf-generator CONNECTOR
    #    (skipping the pdf-generator WORKFLOW — that one's internal
    #    output extraction is buggy. Calling the connector directly
    #    works fine, just like aggregate-tokens above.)
    # ---------------------------------------------------------------
    - type: "connector"
      name: "render-pdf"
      description: "Render the metrics-report payload to a PDF via pdf-generator pyscript. Returns base64 + filename."
      connector:
        name: "pdf-generator"
        command: "invoke_generate"
      inputs:
        template: "'metrics-report'"
        content: "$.get('report_payload')"
        page_size: "'Letter'"
        brand_color: "$.get('brand_color')"
      outputs:
        # pdf-generator returns data: {data_uri, filename, ...} which
        # spreads into root context.
        pdf_data_uri: "$.get('data_uri')"
        pdf_filename: "$.get('filename')"

    # ---------------------------------------------------------------
    # 3. Upload to GCS via the google-storage CONNECTOR directly.
    #    api_key + bucket_name come from context-variables block above.
    # ---------------------------------------------------------------
    - type: "connector"
      name: "upload-pdf"
      description: "Upload the rendered PDF data URI to GCS. Returns the public URL."
      connector:
        name: "google-storage"
        command: "invoke_upload"
      inputs:
        file_path: "$.get('pdf_data_uri')"
        filename: "$.get('pdf_filename')"
        folder: "'token-usage-reports/'"
      outputs:
        pdf_url: "$.get('url')"

    # ---------------------------------------------------------------
    # 4. Email via Resend (resend api_key resolved by the resend
    #    context-variables block; overwrites api_key in workflow
    #    context — so the customer pod's api_key MUST have been
    #    consumed by aggregate-tokens above already)
    # ---------------------------------------------------------------
    - type: "connector"
      name: "send-email-task"
      description: "POST /emails via resend pyscript. Bearer prefix added inside the pyscript."
      connector:
        name: "resend"
        command: "invoke_send"
      inputs:
        api_key: "$.get('api_key')"
        from: "$.get('email_from')"
        to: "$.get('email_to')"
        # Subject and body always lead with "<Org> · <Project>" when
        # an org_label is provided, otherwise just the project. Same
        # naming used in the PDF title (set by the aggregator), the
        # Slack message, and the email — single source of truth for
        # billing readability.
        subject: "f\"{($.get('org_label') + ' · ') if $.get('org_label') else ''}{$.get('project_label')} · {$.get('mode_label', 'Report')} Token Report\""
        text: "f\"{$.get('mode_label', 'Report')} token report for {($.get('org_label') + ' · ') if $.get('org_label') else ''}{$.get('project_label')}.\\n\\nTotal tokens: {$.get('total_tokens', 0):,}\\nTotal runs: {$.get('total_runs', 0):,}\\n\\nPDF: {$.get('pdf_url') or 'PDF unavailable this run'}\""
      outputs:
        email_message_id: "$.get('id')"

    # ---------------------------------------------------------------
    # 5. Slack via incoming webhook
    # ---------------------------------------------------------------
    - type: "connector"
      name: "post-slack-task"
      description: "POST to Slack webhook via slack-webhook pyscript."
      connector:
        name: "slack-webhook"
        command: "invoke_post"
      inputs:
        webhook_url: "$.get('webhook_url')"
        text: "f\":bar_chart: *{($.get('org_label') + ' · ') if $.get('org_label') else ''}{$.get('project_label')}* — {$.get('mode_label', 'report')} token report\\n• *{$.get('total_tokens', 0):,}* tokens · *{$.get('total_runs', 0):,}* runs\\n• PDF: {$.get('pdf_url') or '(unavailable)'}\""
      outputs:
        slack_posted: "True"
