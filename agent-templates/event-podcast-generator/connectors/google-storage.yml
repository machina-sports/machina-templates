connector:
  name: "google-storage"
  description: "Uploads a file to a Google Cloud Storage bucket."
  version: "1.0"
  type: "api"
  openapi:
    openapi: "3.0.0"
    info:
      title: "Google Cloud Storage"
      version: "1.0"
    paths:
      /upload:
        post:
          summary: "Upload a file"
          operationId: "invoke_upload"
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: "object"
                  properties:
                    file_path:
                      type: "string"
          responses:
            "200":
              description: "File uploaded successfully"
              content:
                application/json:
                  schema:
                    type: "object"
                    properties:
                      url:
                        type: "string"
