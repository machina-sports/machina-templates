setup:
  title: "Event Podcast Generator"
  description: "Produces a 5-minute podcast episode for a given sports event ID. It generates a script, synthesizes audio, and uploads it to cloud storage."
  value: "agent-templates/event-podcast-generator"
  category:
    - "custom-templates"
  status: "available"
  version: "1.0.0"
  estimatedTime: "5 minutes"
  features:
    - "Generates a podcast script for a sports event"
    - "Synthesizes audio using Text-to-Speech"
    - "Uploads the final audio to cloud storage"
  integrations:
    - "machina-ai"
    - "google-genai"
    - "google-storage"
    - "sport-events"

datasets:
  - type: "agent"
    path: "agent.yml"
  - type: "workflow"
    path: "workflow.yml"
  - type: "prompt"
    path: "prompts/script.yml"
  - type: "connector"
    path: "connectors/google-storage.yml"
  - type: "connector"
    path: "connectors/sport-events.yml"
