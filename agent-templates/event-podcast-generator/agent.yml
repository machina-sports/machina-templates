agent:
  name: event-podcast-generator
  description: "Generates a 5-minute podcast episode for a given sports event ID."
  version: "1.0"
  workflow: "event-podcast-workflow"
  inputs:
    - name: "event_id"
      type: "string"
      description: "The ID of the sports event."
      required: true
  outputs:
    - name: "podcast_url"
      type: "string"
      description: "The URL of the generated podcast."

