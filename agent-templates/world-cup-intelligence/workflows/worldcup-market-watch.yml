workflow:
  name: worldcup-market-watch
  title: World Cup Intelligence - Market Watch (Skill)
  description: |
    Composite Skill: a tournament-wide market-watch card. Serves a cached candidate when
    fresh (~20 min); otherwise computes movers + informational edges (inline connectors)
    and authors a summary (gemini-3.5-flash), then caches it. Read-only, informational —
    every edge is a candidate to investigate, NOT a bet.

  context-variables:
    debugger:
      enabled: true
    google-genai:
      credential: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_CREDENTIAL
      project_id: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_PROJECT_ID
  inputs:
    force_regen: "$.get('force_regen', False)"
  outputs:
    skill_card: "$.get('cached', {}).get('body', {}) if $.get('cached') else $.get('market_watch', {})"
    served_from: "'cache' if $.get('cached') else 'generated'"
    workflow-status: "($.get('cached') or $.get('market_watch', {})) and 'executed' or 'skipped'"
  tasks:
    - type: document
      name: load-cached
      description: Serve a still-fresh cached market-watch card unless force_regen.
      config:
        action: search
        search-limit: 1
        search-vector: false
      filters:
        name: "'worldcup:skill-market-watch'"
        value.subject_urn: "'global'"
        value.expires_at: "{'$gte': datetime.utcnow().isoformat() + 'Z'}"
      outputs:
        cached: "(($.get('documents', []) or [{}])[0].get('value', {})) if not $.get('force_regen', False) else {}"

    - type: document
      name: load-markets
      description: Current market-cache records.
      condition: "not $.get('cached')"
      config:
        action: search
        search-limit: 1000
        search-vector: false
      filters:
        name: "'worldcup:market-cache'"
      outputs:
        markets: "[d.get('value', {}) for d in ($.get('documents', []) or [])]"

    - type: document
      name: load-snapshots
      description: Price snapshots within the lookback window (baseline for movers).
      condition: "not $.get('cached')"
      continue_on_error: true
      config:
        action: search
        search-limit: 5000
        search-vector: false
      filters:
        name: "'worldcup:market-snapshot'"
        value.ts: "{'$gte': (datetime.utcnow() - timedelta(hours=24)).isoformat()}"
      outputs:
        snapshots: "[d.get('value', {}) for d in ($.get('documents', []) or [])]"

    - type: document
      name: load-forecasts
      description: Model forecasts (optional) for model-vs-market edges.
      condition: "not $.get('cached')"
      continue_on_error: true
      config:
        action: search
        search-limit: 500
        search-vector: false
      filters:
        name: "'worldcup:model-forecast'"
      outputs:
        forecasts: "[d.get('value', {}) for d in ($.get('documents', []) or [])]"

    - type: connector
      name: compute-movers
      description: Rank markets by price move vs the earliest snapshot in the window.
      condition: "not $.get('cached')"
      continue_on_error: true
      connector:
        name: worldcup-market-intelligence
        command: compute_market_movers
      inputs:
        markets: "$.get('markets', [])"
        snapshots: "$.get('snapshots', [])"
        limit: 15
      outputs:
        movers: "$.get('movers', [])"

    - type: connector
      name: detect-edges
      description: Within-venue + cross-venue + model-vs-market informational edges.
      condition: "not $.get('cached')"
      continue_on_error: true
      connector:
        name: worldcup-market-intelligence
        command: detect_market_edges
      inputs:
        cached_markets: "$.get('markets', [])"
        forecasts: "$.get('forecasts', [])"
        min_edge_bps: 150
        limit: 25
      outputs:
        edge_candidates: "$.get('edge_candidates', [])"

    - type: prompt
      name: worldcup-market-watch
      description: Author the structured market-watch card.
      condition: "not $.get('cached')"
      connector:
        name: google-genai
        command: invoke_prompt
        model: gemini-3.5-flash
        location: global
        provider: vertex_ai
      inputs:
        movers: "$.get('movers', [])"
        edge_candidates: "$.get('edge_candidates', [])"
        timeout: 120
      outputs:
        market_watch: "$"

    - type: document
      name: save-candidate
      description: Cache the market-watch card (~20 min TTL).
      condition: "not $.get('cached') and $.get('market_watch', {}) != {}"
      config:
        action: bulk-update
        embed-vector: false
        force-update: true
      document_name: "'worldcup:skill-market-watch'"
      documents:
        items: |
          [{
            '_id': 'market-watch:global',
            'metadata': {'skill': 'market-watch', 'subject_urn': 'global'},
            'skill': 'market-watch',
            'subject_urn': 'global',
            'freshness': 'HOT_SYNC',
            'body': $.get('market_watch', {}),
            'generated_at': datetime.utcnow().isoformat() + 'Z',
            'expires_at': (datetime.utcnow() + timedelta(minutes=20)).isoformat() + 'Z',
            'version_control': {'processing': False, 'finished': True, 'source': 'worldcup-market-watch'},
            'disclaimer': 'Informational sports market intelligence only. Not betting, trading, financial, or investment advice.'
          }]
      inputs:
        market_watch: "$.get('market_watch', {})"
