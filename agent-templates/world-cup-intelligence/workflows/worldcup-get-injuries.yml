workflow:
  name: worldcup-get-injuries
  title: World Cup Intelligence - Injuries
  description: Injuries and suspensions for both teams in a World Cup fixture, from api-football /injuries. Resolve the two teams from an event_urn or provider_event_id.

  context-variables:
    debugger:
      enabled: true
    api-football:
      x-apisports-key: $TEMP_CONTEXT_VARIABLE_API_FOOTBALL_API_KEY
  inputs:
    event_urn: "$.get('event_urn', '')"
    provider_event_id: "$.get('provider_event_id', '')"
    league: "$.get('league', '')"
    season: "$.get('season', '')"
  outputs:
    injuries: "$.get('injuries', {})"
    workflow-status: "$.get('injuries', {}).get('teams') and 'executed' or 'skipped'"
  tasks:
    - type: document
      name: lookup-event
      description: Resolve home/away api-football team ids/names, league id and season from the cached event, by machina event_urn or api-football provider_event_id (fixture id).
      condition: "$.get('event_urn', '') != '' or $.get('provider_event_id', '') != ''"
      config:
        action: search
        search-limit: 1
        search-vector: false
      filters:
        name: "'worldcup:event'"
        value._id: "$.get('event_urn') if $.get('event_urn') else {'$exists': True}"
        value.provider_ids.api_football: "$.get('provider_event_id') if $.get('provider_event_id') else {'$exists': True}"
      outputs:
        home_team_urn: "([t.get('@id') for t in (($.get('documents', []) or [{}])[0].get('value', {}).get('sport:competitors', []) or []) if t.get('sport:qualifier') == 'home'] or [''])[0]"
        away_team_urn: "([t.get('@id') for t in (($.get('documents', []) or [{}])[0].get('value', {}).get('sport:competitors', []) or []) if t.get('sport:qualifier') == 'away'] or [''])[0]"
        home_team_name: "([t.get('name') for t in (($.get('documents', []) or [{}])[0].get('value', {}).get('sport:competitors', []) or []) if t.get('sport:qualifier') == 'home'] or [''])[0]"
        away_team_name: "([t.get('name') for t in (($.get('documents', []) or [{}])[0].get('value', {}).get('sport:competitors', []) or []) if t.get('sport:qualifier') == 'away'] or [''])[0]"
        resolved_year: "((($.get('documents', []) or [{}])[0].get('value', {}).get('schema:startDate') or '2026'))[:4]"

    - type: document
      name: lookup-teams
      description: Resolve api-football team ids from the event's competitor team URNs via the team crosswalk.
      condition: "($.get('home_team_urn') or '') != '' or ($.get('away_team_urn') or '') != ''"
      config:
        action: search
        search-limit: 2
        search-vector: false
      filters:
        name: "'worldcup:identity-crosswalk'"
        value._id: "{'$in': [u for u in [$.get('home_team_urn'), $.get('away_team_urn')] if u]}"
      outputs:
        home_team_id: "([d.get('value', {}).get('provider_ids', {}).get('api_football') for d in ($.get('documents', []) or []) if d.get('value', {}).get('_id') == $.get('home_team_urn')] or [None])[0]"
        away_team_id: "([d.get('value', {}).get('provider_ids', {}).get('api_football') for d in ($.get('documents', []) or []) if d.get('value', {}).get('_id') == $.get('away_team_urn')] or [None])[0]"

    - type: connector
      name: fetch-injuries-af
      description: League-wide World Cup injuries/suspensions from api-football.
      continue_on_error: true
      connector:
        name: api-football
        command: get-injuries
      inputs:
        league: "$.get('resolved_league') or $.get('league') or '1'"
        season: "$.get('resolved_year') or $.get('season') or '2026'"
      outputs:
        injuries_af: "$"

    - type: connector
      name: normalize-injuries
      description: Filter league-wide injuries to the fixture's two teams and dedup per player.
      connector:
        name: worldcup-market-intelligence
        command: normalize_injuries
      inputs:
        af: "$.get('injuries_af', {})"
        home_team_id: "$.get('home_team_id')"
        away_team_id: "$.get('away_team_id')"
        home_team: "$.get('home_team_name', '')"
        away_team: "$.get('away_team_name', '')"
      outputs:
        # runner strips our connector's {status,data} envelope -> $ is the data.
        injuries: "$"
