workflow:
  name: worldcup-find-market-edges
  title: World Cup Intelligence - Find Market Edges
  description: Identify informational price dislocations and arbitrage candidates across Kalshi/Polymarket (within-venue book sums + full 3-way cross-venue moneyline/advance lines, paired on canonical event_urn). Does not execute trades.

  context-variables:
    debugger:
      enabled: true
    google-genai:
      credential: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_CREDENTIAL
      project_id: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_PROJECT_ID
  inputs:
    min_edge_bps: "$.get('min_edge_bps', 100)"
    include_reasoning: "$.get('include_reasoning', True)"
    limit: "$.get('limit', 50)"
  outputs:
    edge_candidates: "$.get('edge_candidates', [])"
    count: "len($.get('edge_candidates', []))"
    analysis: "$.get('analysis', {})"
    warnings: "$.get('edge_warnings', [])"
    workflow-status: "'executed'"
  tasks:
    - type: document
      name: load-market-cache
      description: Load all normalized markets from the same pod document store.
      config:
        action: search
        search-limit: 500
        search-vector: false
      filters:
        name: "'worldcup:market-cache'"
      outputs:
        markets: "[d.get('value', {}) for d in $.get('documents', [])]"

    - type: connector
      name: match-cross-venue
      description: Deterministically pair the same game across Kalshi and Polymarket.
      continue_on_error: true
      connector:
        name: sports-skills
        command: invoke_markets
      inputs:
        command: "'match_markets'"
        sport: "'worldcup'"
      outputs:
        matches: "$.get('data', {}).get('matches', []) if $.get('status') else []"

    - type: document
      name: load-model-forecasts
      description: Model forecasts (optional) -- enable the model_vs_market edge type.
      continue_on_error: true
      config:
        action: search
        search-limit: 500
        search-vector: false
      filters:
        name: "'worldcup:model-forecast'"
      outputs:
        forecasts: "[d.get('value', {}) for d in ($.get('documents', []) or [])]"

    - type: connector
      name: detect-edges
      description: Within-venue book-sum + cross-venue draw + (optional) model-vs-market dislocations.
      connector:
        name: worldcup-market-intelligence
        command: detect_market_edges
      inputs:
        cached_markets: "$.get('markets', [])"
        matches: "$.get('matches', [])"
        forecasts: "$.get('forecasts', [])"
        min_edge_bps: "$.get('min_edge_bps', 100)"
        limit: "$.get('limit', 50)"
      outputs:
        # $ is the connector data payload (envelope already stripped).
        edge_candidates: "$.get('edge_candidates', [])"
        edge_warnings: "$.get('warnings', [])"

    - type: prompt
      name: worldcup-market-edge-analysis
      description: Explain candidate market edges with caveats and source evidence.
      condition: "$.get('include_reasoning', True) is True and len($.get('edge_candidates', [])) > 0"
      connector:
        name: google-genai
        command: invoke_prompt
        model: gemini-3.5-flash
        location: global
        provider: vertex_ai
      inputs:
        edge_candidates: "$.get('edge_candidates', [])"
        timeout: 120
      outputs:
        analysis: "$"
