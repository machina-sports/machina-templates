workflow:
  name: worldcup-refresh-prematch-enrichment
  title: World Cup Intelligence - Refresh Prematch Enrichment
  description: Internal/admin workflow to refresh grounded prematch research for upcoming fixtures and save it onto the same-pod event documents.

  context-variables:
    debugger:
      enabled: true
    google-genai:
      credential: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_CREDENTIAL
      project_id: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_PROJECT_ID
  inputs:
    competition_slug: "$.get('competition_slug', 'world-cup-2026')"
    limit: "$.get('limit', 10)"
    force: "$.get('force', False)"
  outputs:
    fixtures_enriched: "len($.get('search_results', []))"
    workflow-status: "len($.get('search_results', [])) > 0 and 'executed' or 'skipped'"
  tasks:
    - type: document
      name: find-fixtures-for-research
      description: Find upcoming World Cup fixtures requiring fresh prematch research in same-pod state.
      config:
        action: search
        search-limit: 10
        search-vector: false
      filters:
        name: "'worldcup:event'"
        value.machina_competition_slug: "$.get('competition_slug', 'world-cup-2026')"
      outputs:
        fixtures: "[d.get('value', {}) for d in $.get('documents', [])][:int($.get('limit', 10))]"
        has_fixtures: "len($.get('documents', [])) > 0"

    # Grounded Google Search via google-genai invoke_search (sportingbot
    # coverage pattern) — one grounded answer + source links per fixture.
    - type: connector
      name: search-prematch
      description: Grounded Google Search for pre-match analysis per fixture.
      condition: "$.get('has_fixtures') is True"
      continue_on_error: true
      connector:
        name: google-genai
        command: invoke_search
        model: gemini-3.5-flash
        provider: vertex_ai
        location: global
      foreach:
        concurrent: false
        name: fixture_item
        expr: $
        value: "$.get('fixtures', [])"
      inputs:
        search_query: >
          $.get('fixture_item', {}).get('name', '') + ' FIFA World Cup 2026 preview injuries lineups odds market context'
        recency_days: 7
        timeout: 120
      outputs:
        # Foreach task outputs evaluate against the connector's result payload
        # (no fixture_item in scope) — invoke_search echoes the query, which
        # embeds the fixture name, so that's the correlation key.
        search_results: |
          [{'query': $.get('query', ''), 'research': $.get('answer', ''), 'sources': $.get('search_results', [])}]

    - type: document
      name: save-prematch-research
      description: Save grounded research onto the event documents so get-event-context serves it.
      # Conditions cannot use comprehensions (the engine evals them with
      # `context` in locals only; comprehension scopes see just globals) —
      # keep this simple. Items below always include every fixture, so the
      # engine's empty-bulk-update crash (run_document returns None when
      # items is []) cannot trigger while fixtures exist.
      condition: "len($.get('fixtures', [])) > 0 and len($.get('search_results', [])) > 0"
      config:
        action: bulk-update
        embed-vector: false
        force-update: true
      document_name: "'worldcup:event'"
      documents:
        # Correlate result→fixture by the fixture name embedded at the start
        # of the echoed search query. Fixtures without a fresh match keep
        # their existing prematch_research; failed foreach iterations can
        # leave None entries, hence the isinstance guards.
        items: |
          [
            dict(f, **{
              'metadata': {'event_urn': f.get('_id', '')},
              'prematch_research': next(
                (r for r in $.get('search_results', []) if isinstance(r, dict) and r.get('research') and f.get('name') and r.get('query', '').startswith(f.get('name'))),
                f.get('prematch_research', {}) or {}
              )
            })
            for f in $.get('fixtures', [])
            if isinstance(f, dict) and f.get('_id')
          ]
      inputs:
        fixtures: "$.get('fixtures', [])"
        search_results: "$.get('search_results', [])"
