workflow:
  name: worldcup-sync-team-crosswalk
  title: World Cup Intelligence - Sync Team Identity Crosswalk
  description: |
    Build the national-team identity crosswalk: urn:machina:sport:soccer:team URNs with
    provider_ids from api-football + ESPN + Sportradar + Opta, joined by country (iso3).
    Saves worldcup:identity-crosswalk docs.

  context-variables:
    debugger:
      enabled: true
    api-football:
      x-apisports-key: $TEMP_CONTEXT_VARIABLE_API_FOOTBALL_API_KEY
    sportradar-soccer:
      api_key: $TEMP_CONTEXT_VARIABLE_SPORTRADAR_SOCCER_V4_API_KEY
    opta:
      outlet: $MACHINA_CONTEXT_VARIABLE_OPTA_OUTLET
      secret: $MACHINA_CONTEXT_VARIABLE_OPTA_SECRET
    bwin:
      Bwin-AccessId: $TEMP_CONTEXT_VARIABLE_BWIN_ACCESS_ID
      Bwin-AccessIdToken: $TEMP_CONTEXT_VARIABLE_BWIN_ACCESS_ID_TOKEN
  inputs:
    league: "$.get('league', '1')"
    season: "$.get('season', '2026')"
    sr_season_id: "$.get('sr_season_id', 'sr:season:101177')"
    opta_wc_tmcl: "$.get('opta_wc_tmcl', '873cbl9cd9butm4air0mugxzo')"
    bwin_country: "$.get('bwin_country', 'gb')"
    bwin_competition_id: "$.get('bwin_competition_id', '102868')"
  outputs:
    saved_count: "len($.get('normalized_items', []))"
    provider_summary: "$.get('provider_summary', {})"
    workflow-status: "len($.get('normalized_items', [])) > 0 and 'executed' or 'skipped'"
  tasks:
    - type: connector
      name: fetch-af-teams
      description: World Cup teams from api-football.
      continue_on_error: true
      connector:
        name: api-football
        command: get-teams
      inputs:
        league: "$.get('league', '1')"
        season: "$.get('season', '2026')"
      outputs:
        af_teams: "[{'id': str((r.get('team') or {}).get('id') or ''), 'name': (r.get('team') or {}).get('name')} for r in $.get('response', []) if (r.get('team') or {}).get('id')]"

    - type: connector
      name: fetch-espn-teams
      description: ESPN team ids for the World Cup season via sports-skills.
      continue_on_error: true
      connector:
        name: sports-skills
        command: invoke_football
      inputs:
        command: "'get_season_teams'"
        season_id: "'world-cup-2026'"
      outputs:
        espn_teams: "$.get('data', {}).get('teams', []) if $.get('status') else []"

    - type: connector
      name: fetch-sr-competitors
      description: Sportradar competitors for the World Cup 2026 season.
      continue_on_error: true
      connector:
        name: sportradar-soccer
        command: get-seasons/{season_id}/competitors.json
        command_attribute:
          season_id: "$.get('sr_season_id', 'sr:season:101177')"
      inputs:
        api_key: "$.get('api_key')"
      outputs:
        sportradar_teams: "$.get('season_competitors', [])"

    - type: connector
      name: opta-auth
      description: Get an Opta OAuth access token.
      continue_on_error: true
      connector:
        name: opta
        command: authorization
      outputs:
        opta_token: "$.get('access_token')"

    - type: connector
      name: fetch-opta-wc
      description: Opta contestants for the FIFA World Cup 2026 tournament calendar.
      condition: "$.get('opta_token') is not None"
      continue_on_error: true
      connector:
        name: opta
        command: invoke_request
      inputs:
        access_token: "$.get('opta_token')"
        endpoint: "'team'"
        query_params: "{'tmcl': $.get('opta_wc_tmcl', '873cbl9cd9butm4air0mugxzo')}"
      outputs:
        opta_wc: "$.get('contestant', [])"

    - type: connector
      name: fetch-bwin-wc
      description: Entain/bwin teams for the World Cup competition (from two-participant match fixtures).
      continue_on_error: true
      connector:
        name: bwin
        command: get-offer/api/{sportId}/{country}/fixtures
        command_attribute:
          sportId: "'4'"
          country: "$.get('bwin_country', 'gb')"
      inputs:
        language: "'en'"
        competitionIds: "$.get('bwin_competition_id', '102868')"
        onlyMainMarkets: "'true'"
      outputs:
        entain_teams: "[{'id': p.get('id'), 'name': (p.get('name', {}).get('text') if isinstance(p.get('name'), dict) else p.get('name'))} for f in ($.get('items', []) or []) if isinstance(f, dict) and len(f.get('participants') or []) == 2 for p in (f.get('participants') or []) if p.get('id')]"

    - type: connector
      name: merge-entities
      description: Join provider team lists by iso3 into crosswalk items.
      connector:
        name: worldcup-market-intelligence
        command: merge_provider_entities
      inputs:
        api_football_teams: "$.get('af_teams', [])"
        espn_teams: "$.get('espn_teams', [])"
        sportradar_teams: "$.get('sportradar_teams', [])"
        opta_teams: "$.get('opta_wc', [])"
        entain_teams: "$.get('entain_teams', [])"
      outputs:
        items: "$.get('items', [])"
        provider_summary: "$.get('provider_summary', {})"

    - type: connector
      name: normalize-crosswalk
      description: Mint urn:machina team URNs + provider_ids for each merged item.
      connector:
        name: worldcup-market-intelligence
        command: normalize_identity_crosswalk
      inputs:
        items: "$.get('items', [])"
      outputs:
        normalized_items: "$.get('normalized_items', [])"

    - type: document
      name: save-crosswalk
      description: Save the team identity crosswalk to same-pod document state.
      condition: "len($.get('normalized_items', [])) > 0"
      config:
        action: bulk-update
        embed-vector: false
        force-update: true
      document_name: "'worldcup:identity-crosswalk'"
      documents:
        items: "$.get('normalized_items', [])"
      inputs:
        normalized_items: "$.get('normalized_items', [])"
