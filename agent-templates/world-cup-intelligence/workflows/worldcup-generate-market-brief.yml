workflow:
  name: worldcup-generate-market-brief
  title: World Cup Intelligence - Generate Market Brief
  description: Generate a structured Google GenAI market-intelligence brief from same-pod event context, markets, prematch research, and optional xAI social pulse.

  context-variables:
    debugger:
      enabled: true
    google-genai:
      credential: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_CREDENTIAL
      project_id: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_PROJECT_ID
  inputs:
    query: "$.get('query', '')"
    event_urn: "$.get('event_urn', '')"
    market_ids: "$.get('market_ids', [])"
    depth: "$.get('depth', 'standard')"
    include_social_pulse: "$.get('include_social_pulse', True)"
  outputs:
    brief: "$.get('brief', {})"
    evidence: "$.get('evidence', [])"
    workflow-status: "$.get('brief', {}) != {} and 'executed' or 'skipped'"
  tasks:
    - type: document
      name: lookup-event-context
      description: Load event context from same-pod document store if event_urn is provided.
      condition: "$.get('event_urn', '') != ''"
      config:
        action: search
        search-limit: 1
        search-vector: false
      filters:
        name: "'worldcup:event'"
        value._id: "$.get('event_urn')"
      outputs:
        event_context: "($.get('documents', []) or [{}])[0].get('value', {})"

    - type: document
      name: lookup-markets
      description: Load the normalized market cache from same-pod state for brief context.
      config:
        action: search
        search-limit: 50
        search-vector: false
      filters:
        name: "'worldcup:market-cache'"
      outputs:
        markets: "[d.get('value', {}) for d in $.get('documents', [])]"

    # Grounded Google Search via google-genai invoke_search (sportingbot
    # coverage pattern) — returns a grounded answer plus source links.
    - type: connector
      name: grounded-prematch-research
      description: Google GenAI grounded search for latest match and market context.
      condition: "($.get('query', '') != '' or $.get('event_context', {}) != {})"
      continue_on_error: true
      connector:
        name: google-genai
        command: invoke_search
        model: gemini-3.5-flash
        provider: vertex_ai
        location: global
      inputs:
        search_query: "($.get('query') or $.get('event_context', {}).get('name', 'FIFA World Cup 2026')) + ' FIFA World Cup 2026 team news injuries odds market analysis'"
        recency_days: 7
        timeout: 120
      outputs:
        prematch_research: "$.get('answer', '')"
        grounding_sources: "$.get('search_results', [])"

    - type: prompt
      name: worldcup-market-brief
      description: Generate the structured market brief with Google GenAI.
      connector:
        name: google-genai
        command: invoke_prompt
        model: gemini-3.5-flash
        location: global
        provider: vertex_ai
      inputs:
        query: "$.get('query', '')"
        event_context: "$.get('event_context', {})"
        markets: "$.get('markets', [])"
        prematch_research: "$.get('prematch_research', '')"
        grounding_sources: "$.get('grounding_sources', [])"
        depth: "$.get('depth', 'standard')"
      outputs:
        brief: "$"
        evidence: "$.get('evidence', [])"
