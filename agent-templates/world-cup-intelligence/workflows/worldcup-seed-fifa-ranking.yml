workflow:
  name: worldcup-seed-fifa-ranking
  title: World Cup Intelligence - Seed FIFA Ranking
  description: |
    Bootstrap prior for the forecast model. Loads the 48 qualified teams from the
    crosswalk, grounded-searches the current FIFA world ranking, extracts a rank for
    EVERY one of the 48, and normalizes into 0-1 seed_ratings (canonical team URNs)
    saved as worldcup:fifa-ranking. compute_power_ranking blends these seeds with
    results until enough group-stage matches have been played. Read-only. Occasional
    sync (ranking changes slowly).

  context-variables:
    debugger:
      enabled: true
    google-genai:
      credential: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_CREDENTIAL
      project_id: $TEMP_CONTEXT_VARIABLE_VERTEX_AI_PROJECT_ID
  inputs:
    as_of: "$.get('as_of', '')"
  outputs:
    seed_count: "len($.get('seed_ratings', []))"
    workflow-status: "len($.get('seed_ratings', [])) > 0 and 'executed' or 'skipped'"
  tasks:
    - type: document
      name: load-teams
      description: The 48 qualified teams (canonical name + URN) to rank.
      config:
        action: search
        search-limit: 100
        search-vector: false
      filters:
        name: "'worldcup:identity-crosswalk'"
        value._id: {"$regex": "^urn:machina:sport:soccer:team:"}
      outputs:
        teams: "[{'team_name': d.get('value', {}).get('name'), 'team_urn': d.get('value', {}).get('_id')} for d in ($.get('documents', []) or [])]"
        team_names: "[d.get('value', {}).get('name') for d in ($.get('documents', []) or []) if d.get('value', {}).get('name')]"

    - type: connector
      name: grounded-fifa-ranking
      description: Grounded search for the current FIFA men's world ranking.
      connector:
        name: google-genai
        command: invoke_search
        model: gemini-3.1-flash-lite
        location: global
        provider: vertex_ai
      inputs:
        search_query: "'Latest FIFA men\\'s world ranking table with each nation\\'s world ranking position number, covering all teams in this list: ' + ', '.join($.get('team_names', []))"
        recency_days: 30
        timeout: 120
      outputs:
        fifa_research: "$.get('answer', $.get('text', ''))"

    - type: prompt
      name: worldcup-fifa-ranking-extract
      description: Assign a FIFA world-ranking position to every one of the 48 teams.
      condition: "len($.get('team_names', [])) > 0"
      connector:
        name: google-genai
        command: invoke_prompt
        model: gemini-3.5-flash
        location: global
        provider: vertex_ai
      inputs:
        fifa_research: "$.get('fifa_research', '')"
        team_names: "$.get('team_names', [])"
        timeout: 120
      outputs:
        rankings: "$.get('rankings', [])"

    - type: connector
      name: normalize-seed
      description: Normalize ranks into 0-1 seed ratings keyed by canonical team URN.
      condition: "len($.get('rankings', [])) > 0"
      connector:
        name: worldcup-market-intelligence
        command: normalize_fifa_seed
      inputs:
        rankings: "$.get('rankings', [])"
        teams: "$.get('teams', [])"
      outputs:
        seed_ratings: "$.get('seed_ratings', [])"

    - type: document
      name: save-fifa-ranking
      description: Persist the seed ratings as worldcup:fifa-ranking docs.
      condition: "len($.get('seed_ratings', [])) > 0"
      config:
        action: bulk-update
        embed-vector: false
        force-update: true
      document_name: "'worldcup:fifa-ranking'"
      documents:
        items: "[dict(s, _id=s.get('team_urn'), metadata={'team_urn': s.get('team_urn')}) for s in $.get('seed_ratings', [])]"
      inputs:
        seed_ratings: "$.get('seed_ratings', [])"
