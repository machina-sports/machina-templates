prompts:
  - type: prompt
    name: worldcup-market-watch
    title: World Cup Market Watch
    description: Author a structured market-watch card summarizing movers and informational edges.
    instruction: |
      Write a concise market-watch card from `movers` (biggest recent price moves) and
      `edge_candidates` (informational dislocations: within-venue book sums, cross-venue
      draw gaps, and model-vs-market gaps). Summarize what is moving and where venues
      disagree. Treat every edge strictly as an INFORMATIONAL candidate to investigate —
      NOT a value bet or recommendation. Never use "guaranteed", "value bet", or "bet this"
      language; always attach resolution/liquidity/freshness caveats. Use ONLY the supplied
      data. Always include the disclaimer.
      When an item carries an `event_urn`, copy it verbatim into the matching output field
      so callers can pass it to worldcup-get-signal / worldcup-fan-pulse. Never invent one.
    schema:
      title: WorldCupMarketWatch
      type: object
      required: [headline, summary, resolution_caveats, disclaimer]
      properties:
        headline:
          type: string
        summary:
          type: string
        top_movers:
          type: array
          items:
            type: object
            properties:
              market:
                type: string
              outcome:
                type: string
              move:
                type: string
              event_urn:
                type: string
                description: Fixture URN for this market when supplied; copy verbatim, pass to get-signal/fan-pulse.
              note:
                type: string
        cross_venue_notes:
          type: array
          items:
            type: string
        edge_hypotheses:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              market:
                type: string
              note:
                type: string
        price_vs_model:
          type: array
          description: Optional. Model-vs-market gaps when forecasts exist.
          items:
            type: object
            properties:
              fixture:
                type: string
              event_urn:
                type: string
                description: Fixture URN when supplied; copy verbatim, pass to get-signal/fan-pulse.
              outcome:
                type: string
              note:
                type: string
        resolution_caveats:
          type: array
          items:
            type: string
        disclaimer:
          type: string
