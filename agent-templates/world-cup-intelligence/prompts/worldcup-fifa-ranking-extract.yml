prompts:
  - type: prompt
    name: worldcup-fifa-ranking-extract
    title: World Cup FIFA Ranking Extract
    description: Extract a structured list of nations and FIFA ranking points from grounded search text.
    instruction: |
      You are given `team_names` (the list of nations to rank) and `fifa_research`
      (grounded search text about the current FIFA men's world ranking). Return a
      ranking entry {team_name, rank, points} for EVERY team in `team_names` — all of
      them, none omitted. Use the EXACT team_name strings from `team_names`.
      `rank` is the FIFA world-ranking POSITION (integer, 1 = best): take it from
      `fifa_research` when present, otherwise use your best knowledge of the current
      FIFA ranking. `points` is the numeric ranking-points total — include ONLY if a
      figure is explicitly in `fifa_research`, otherwise omit the points field. Do not
      invent points. Every team must receive a plausible rank so the list length equals
      the number of teams in `team_names`.
    schema:
      title: WorldCupFifaRanking
      type: object
      required: [rankings]
      properties:
        rankings:
          type: array
          items:
            type: object
            required: [team_name, rank]
            properties:
              team_name:
                type: string
              rank:
                type: integer
              points:
                type: number
