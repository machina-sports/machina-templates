connector:
  name: "worldcup-market-intelligence"
  description: "Read-only World Cup market-intelligence utilities for normalizing and filtering Sports Skills, Kalshi, and Polymarket payloads into stable API/MCP response shapes."
  filename: "worldcup-market-intelligence.py"
  filetype: "pyscript"
  commands:
    - name: "Normalize market sources"
      value: "normalize_market_sources"
    - name: "Filter cached markets"
      value: "filter_cached_markets"
    - name: "Normalize market state"
      value: "normalize_market_state"
    - name: "Detect market edges"
      value: "detect_market_edges"
    - name: "Detect price move"
      value: "detect_price_move"
    - name: "Normalize standings"
      value: "normalize_standings"
    - name: "Normalize squads"
      value: "normalize_squads"
    - name: "Normalize injuries"
      value: "normalize_injuries"
    - name: "Normalize schedule"
      value: "normalize_schedule"
    - name: "Normalize player match stats"
      value: "normalize_player_match_stats"
    - name: "Classify FIFA Power Ranking categories"
      value: "classify_fifa_power_categories"
    - name: "Apply Power Ranking eligibility"
      value: "apply_power_ranking_eligibility"
    - name: "Score provisional player performance"
      value: "score_provisional_player_performance"
    - name: "Merge official and provisional performance"
      value: "merge_official_and_provisional_performance"
    - name: "Normalize identity crosswalk"
      value: "normalize_identity_crosswalk"
    - name: "Mint event identity"
      value: "mint_event_identity"
    - name: "Merge provider entities"
      value: "merge_provider_entities"
    - name: "Build player crosswalk"
      value: "build_player_crosswalk"
    - name: "Build event crosswalk"
      value: "build_event_crosswalk"
    - name: "Link market entities"
      value: "link_market_entities"
    - name: "Build market snapshots"
      value: "build_market_snapshots"
    - name: "Compute market movers"
      value: "compute_market_movers"
    - name: "Compute coverage signals"
      value: "compute_coverage_signals"
    - name: "Apply live status"
      value: "apply_live_status"
    - name: "Normalize FIFA seed ratings"
      value: "normalize_fifa_seed"
    - name: "Compute power ranking"
      value: "compute_power_ranking"
    - name: "Compute match probabilities"
      value: "compute_match_probabilities"
    - name: "Build event forecasts"
      value: "build_event_forecasts"
    - name: "Compute model-vs-market edge"
      value: "compute_model_vs_market_edge"
    - name: "Compute forecast audit"
      value: "compute_forecast_audit"
