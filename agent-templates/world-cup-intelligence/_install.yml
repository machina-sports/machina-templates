setup:
  title: World Cup Intelligence
  description: Hosted World Cup market-intelligence workflows combining API-Football match truth, IPTC semantic mapping, Sports Skills context, Kalshi/Polymarket markets, Google GenAI reasoning/grounding, and xAI/Grok fan sentiment/news.
  category:
    - sports
    - prediction-markets
    - world-cup
    - market-intelligence
  estimatedTime: 3 minutes
  features:
    - API-Football fixture ingestion normalized to IPTC Sport Schema with provider URNs.
    - World Cup market search across Kalshi and Polymarket.
    - Event context using Sports Skills, API-Football, and semantic-layer cache.
    - Google GenAI grounded reasoning for structured market briefs.
    - xAI/Grok fan sentiment and live news pulse.
    - Market edge and arbitrage-candidate analysis for agent workflows.
    - Statistical match forecasts (Dixon-Coles) with model-vs-market gaps + Brier/calibration backtesting.
    - Composite editorial Skills (match-preview, match-recap, player-spotlight, fan-pulse, market-watch) as TTL-cached cards.
    - Structured betting signal (recommendation + edge% + EV + Kelly stake + risk flags), line-shopped + de-vigged.
    - Perfect-bracket simulator (wcbracket-*) -- Monte Carlo of the knockout tree (R32 -> Final) with per-team advancement + champion odds, market-anchored where priced.
    - Read-only workflows suitable for API/MCP productization.
  integrations:
    - api-football
    - sports-skills
    - kalshi
    - polymarket
    - google-genai
    - xai
    - grok
    - pod-document-store
  status: available
  value: agent-templates/world-cup-intelligence
  version: 0.6.0

