agent:
  name: world-cup-market-analyst-agent
  title: World Cup Market Analyst
  description: Analyst agent focused on Kalshi/Polymarket comparison, market-edge discovery, and grounded match-context briefs.
  context:
    config-frequency: 60
    status: "inactive"
  context-agent:
    query: "$.get('query', 'FIFA World Cup')"
    event_urn: "$.get('event_urn', '')"
  workflows:
    - name: worldcup-compare-market-sources
      description: Compare normalized markets by source
      inputs:
        query: "$.get('query', 'FIFA World Cup')"
      outputs:
        comparison: "$.get('comparison', {})"

    - name: worldcup-find-market-edges
      description: Identify informational arbitrage/edge candidates
      inputs:
        query: "$.get('query', 'FIFA World Cup')"
      outputs:
        edge_candidates: "$.get('edge_candidates', [])"
        analysis: "$.get('analysis', {})"

    - name: worldcup-generate-market-brief
      description: Generate a grounded market-intelligence brief
      inputs:
        query: "$.get('query', 'FIFA World Cup')"
        event_urn: "$.get('event_urn', '')"
      outputs:
        brief: "$.get('brief', {})"

    - name: worldcup-get-match-forecast
      description: Model-implied probabilities (Dixon-Coles) + model-vs-market gaps for a fixture (informational)
      inputs:
        event_urn: "$.get('event_urn', '')"
      outputs:
        forecast: "$.get('forecast', {})"
        model_vs_market: "$.get('model_vs_market', {})"

    - name: worldcup-market-watch
      description: Composite market-watch card — movers + informational edges (cached, read-only)
      inputs:
        force_regen: "$.get('force_regen', False)"
      outputs:
        skill_card: "$.get('skill_card', {})"

    - name: worldcup-get-signal
      description: Structured betting signal — recommendation + edge% + EV + Kelly stake + risk flags (decision support). Pass event_urn, OR event ("Brazil vs Morocco"), OR team (+ optional opponent/date) to auto-resolve the fixture.
      inputs:
        event_urn: "$.get('event_urn', '')"
        event: "$.get('event', '')"
        team: "$.get('team', '')"
        opponent: "$.get('opponent', '')"
        date: "$.get('date', '')"
        bankroll: "$.get('bankroll', '')"
        fee_bps: "$.get('fee_bps', 0)"
      outputs:
        signal: "$.get('signal', {})"
        recommendation: "$.get('recommendation', '')"
        top_pick: "$.get('top_pick', {})"
        event_urn: "$.get('event_urn', '')"
        warnings: "$.get('warnings', [])"

    - name: worldcup-get-schedule
      description: List World Cup fixtures (with their event_urn) from the event cache, filtered by date/team/opponent/status. Use this to resolve "Team A vs Team B" to an event_urn for get-signal.
      inputs:
        team: "$.get('team', '')"
        opponent: "$.get('opponent', '')"
        date_from: "$.get('date_from', '')"
        date_to: "$.get('date_to', '')"
      outputs:
        schedule: "$.get('schedule', {})"

    - name: worldcup-resolve
      description: Resolve any provider id (api_football, sportradar, opta, espn, …) or canonical URN to the entity it identifies (team/player/event), with all cross-provider ids attached.
      inputs:
        id: "$.get('id', '')"
      outputs:
        entity: "$.get('entity', {})"
        entities: "$.get('entities', [])"

  instructions: |
    Compare market data across Kalshi and Polymarket using normalized prices, liquidity, volume, and close times.
    Call out candidate price dislocations or arbitrage-style opportunities only as analysis for a human/agent to evaluate independently.
    Do not execute trades or provide personalized financial advice.
