agent:
  name: world-cup-intelligence-agent
  title: World Cup Intelligence Agent
  description: Read-only agent for FIFA World Cup fixture context, semantic event lookup, prediction-market discovery, grounded market intelligence, and market-edge analysis.
  context:
    config-frequency: 60
    status: "inactive"
  context-agent:
    query: "$.get('query', 'FIFA World Cup')"
    event_urn: "$.get('event_urn', '')"
  workflows:
    - name: worldcup-search-markets
      description: Search Kalshi/Polymarket World Cup markets by query/team text
      inputs:
        query: "$.get('query', 'FIFA World Cup')"
      outputs:
        markets: "$.get('markets', [])"

    - name: worldcup-get-market-state
      description: Get current price, order-book depth, and history for a market by id
      inputs:
        market_id: "$.get('market_id', '')"
      outputs:
        market: "$.get('market', {})"
        book: "$.get('book', {})"
        history: "$.get('history', [])"

    - name: worldcup-get-event-context
      description: Resolve enriched match context
      inputs:
        event_urn: "$.get('event_urn', '')"
      outputs:
        event_context: "$.get('event_context', {})"

    - name: worldcup-get-standings
      description: World Cup group tables / standings
      inputs:
        event_urn: "$.get('event_urn', '')"
      outputs:
        standings: "$.get('standings', {})"

    - name: worldcup-get-squads
      description: Squads for both teams in a fixture
      inputs:
        event_urn: "$.get('event_urn', '')"
      outputs:
        squads: "$.get('squads', {})"

    - name: worldcup-get-injuries
      description: Injuries and suspensions for both teams in a fixture (api-football)
      inputs:
        event_urn: "$.get('event_urn', '')"
      outputs:
        injuries: "$.get('injuries', {})"

    - name: worldcup-get-schedule
      description: List World Cup fixtures from the event cache, filtered by date/team/status
      inputs:
        team: "$.get('team', '')"
        date_from: "$.get('date_from', '')"
        date_to: "$.get('date_to', '')"
      outputs:
        schedule: "$.get('schedule', {})"

    - name: worldcup-get-player-performance-context
      description: Player performance context for a fixture (FIFA Power Ranking + Machina provisional signals)
      inputs:
        event_urn: "$.get('event_urn', '')"
        player_id: "$.get('player_id', '')"
        team_id: "$.get('team_id', '')"
      outputs:
        player_performance_context: "$.get('player_performance_context', {})"

    - name: worldcup-get-match-forecast
      description: Model-implied match probabilities (Dixon-Coles) + model-vs-market gaps for a fixture (informational)
      inputs:
        event_urn: "$.get('event_urn', '')"
      outputs:
        forecast: "$.get('forecast', {})"
        model_vs_market: "$.get('model_vs_market', {})"

    - name: worldcup-get-signal
      description: Structured betting signal — recommendation + edge% + EV + Kelly stake + risk flags (decision support)
      inputs:
        event_urn: "$.get('event_urn', '')"
        bankroll: "$.get('bankroll', '')"
      outputs:
        signal: "$.get('signal', {})"
        recommendation: "$.get('recommendation', '')"
        top_pick: "$.get('top_pick', {})"

    - name: worldcup-find-market-edges
      description: Identify informational market-edge and arbitrage candidates
      inputs:
        min_edge_bps: "$.get('min_edge_bps', 100)"
      outputs:
        edge_candidates: "$.get('edge_candidates', [])"
        edge_analysis: "$.get('analysis', {})"

    - name: worldcup-explain-market-move
      description: Explain why a market price moved, with grounded evidence
      inputs:
        market_id: "$.get('market_id', '')"
      outputs:
        move: "$.get('move', {})"
        explanation: "$.get('explanation', {})"

    - name: worldcup-generate-market-brief
      description: Generate a grounded World Cup market-intelligence brief
      inputs:
        query: "$.get('query', 'FIFA World Cup')"
        event_urn: "$.get('event_urn', '')"
      outputs:
        brief: "$.get('brief', {})"

    - name: worldcup-match-preview
      description: Composite match-preview card for a fixture (cached, grounded)
      inputs:
        event_urn: "$.get('event_urn', '')"
      outputs:
        skill_card: "$.get('skill_card', {})"

    - name: worldcup-match-recap
      description: Composite post-match recap card (final fixtures only, cached evergreen)
      inputs:
        event_urn: "$.get('event_urn', '')"
      outputs:
        skill_card: "$.get('skill_card', {})"

    - name: worldcup-player-spotlight
      description: Composite player-spotlight card (cached, grounded)
      inputs:
        player_urn: "$.get('player_urn', '')"
      outputs:
        skill_card: "$.get('skill_card', {})"

    - name: worldcup-fan-pulse
      description: Composite fan-pulse card (social/news sentiment, cached)
      inputs:
        query: "$.get('query', 'FIFA World Cup')"
        event_urn: "$.get('event_urn', '')"
      outputs:
        skill_card: "$.get('skill_card', {})"

  instructions: |
    Use match truth from API-Football, IPTC mappings, and provider event URNs before reasoning over markets.
    Use Google GenAI for grounded structured briefs and xAI/Grok for social/news pulse.
    You may surface market-edge or arbitrage candidates as informational analysis, but do not place trades, execute bets, promise profit, or present personalized financial advice.
    Always include evidence, uncertainty, and source attribution when available.
